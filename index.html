<script type="text/babel">
const { useState, useEffect } = React;

const STORAGE_KEY = "arbeitszeit_eintraege";
const CONFIG_KEY  = "arbeitszeit_config";

const DEFAULT_TAGESTYPEN = [
  { id: "arbeit",    label: "Arbeit",       icon: "💼", color: "#a78bfa", zaehlt: true,  bezahlt: true  },
  { id: "urlaub",    label: "Urlaub",       icon: "🏖️", color: "#38bdf8", zaehlt: false, bezahlt: true  },
  { id: "krank",     label: "Krank",        icon: "🤒", color: "#f87171", zaehlt: false, bezahlt: true  },
  { id: "kindkrank", label: "Kind krank",   icon: "👶", color: "#fb923c", zaehlt: false, bezahlt: true  },
  { id: "frei",      label: "Frei",         icon: "😴", color: "#6b7280", zaehlt: false, bezahlt: false },
  { id: "wochenende",label: "Wochenende",   icon: "🌅", color: "#94a3b8", zaehlt: false, bezahlt: false },
  { id: "feiertag",  label: "Feiertag",     icon: "🎉", color: "#facc15", zaehlt: false, bezahlt: true  },
  { id: "homeoffice",label: "Homeoffice",   icon: "🏠", color: "#34d399", zaehlt: true,  bezahlt: true  },
];

const defaultConfig = {
  stundenlohn: 10.06, regelarbeitszeit: 7.6, ueberstundenZuschlag: 25,
  steuerklasse: 1, kirchensteuer: false, bundesland: "BY", kinderfreibetrage: 0,
  tagestypen: DEFAULT_TAGESTYPEN,
  dezimalformat: false,
  spesenBetrag: 6.60,
  spesenMindestStunden: 8.0,
  ueberstundenMindestStunden: 8.0,
  zusatzAbzuege: [],
  urlaubstageProJahr: 28,
  defaultStart: "07:00",
  defaultEnde: "15:36",
  defaultPause: "30",
};

function parseTime(str) {
  if (!str) return null;
  const [h, m] = str.split(":").map(Number);
  return h * 60 + m;
}
function formatMinutes(min) {
  const h = Math.floor(Math.abs(min) / 60);
  const m = Math.abs(min) % 60;
  return `${h}h ${m.toString().padStart(2,"0")}min`;
}

function formatZeit(min, dezimal) {
  if (dezimal) {
    const h = Math.abs(min) / 60;
    return `${h.toFixed(2)}h`;
  }
  const h = Math.floor(Math.abs(min) / 60);
  const m = Math.abs(min) % 60;
  return `${h}h ${m.toString().padStart(2,"0")}min`;
}

function berechneTag(eintrag, config) {
  const start = parseTime(eintrag.start), ende = parseTime(eintrag.ende);
  const pause = Number(eintrag.pause) || 0;
  if (start === null || ende === null) return null;
  const gesamtMin = ende - start - pause;
  if (gesamtMin <= 0) return null;
  const gesamtStunden = gesamtMin / 60;
  const ueberGrenze = config.ueberstundenMindestStunden || config.regelarbeitszeit;
  const normalStunden = Math.min(gesamtStunden, ueberGrenze);
  const ueberStunden  = Math.max(0, gesamtStunden - ueberGrenze);
  const normalLohn = normalStunden * config.stundenlohn;
  const ueberLohn  = ueberStunden  * config.stundenlohn * (1 + config.ueberstundenZuschlag / 100);
  return { gesamtMin, gesamtStunden, normalStunden, ueberStunden, normalLohn, ueberLohn, gesamtLohn: normalLohn + ueberLohn };
}

const KIRCHENSTEUER_SATZ = {
  BY:0.08,BW:0.08,BE:0.09,BB:0.09,HB:0.09,HH:0.09,HE:0.09,
  MV:0.09,NI:0.09,NW:0.09,RP:0.09,SL:0.09,SN:0.09,ST:0.09,SH:0.09,TH:0.09
};
const BUNDESLAENDER = [
  ["BY","Bayern"],["BW","Baden-Württemberg"],["BE","Berlin"],["BB","Brandenburg"],
  ["HB","Bremen"],["HH","Hamburg"],["HE","Hessen"],["MV","Mecklenburg-Vorpommern"],
  ["NI","Niedersachsen"],["NW","Nordrhein-Westfalen"],["RP","Rheinland-Pfalz"],
  ["SL","Saarland"],["SN","Sachsen"],["ST","Sachsen-Anhalt"],["SH","Schleswig-Holstein"],["TH","Thüringen"]
];

function berechneNetto(bruttoMonat, config) {
  // BMF PAP 2026 + korrekte SV-Sätze 2026
  const { steuerklasse, kirchensteuer, bundesland, kinderfreibetrage } = config;
  const sk = Number(steuerklasse);
  const kinder = Number(kinderfreibetrage) || 0;

  // ── Sozialversicherung 2026 ──
  const BBG_RV = 96600 / 12;  // 8050 €/Monat
  const BBG_KV = 69750 / 12;  // 5812.50 €/Monat
  const rvBasis = Math.min(bruttoMonat, BBG_RV);
  const kvBasis = Math.min(bruttoMonat, BBG_KV);

  const rv = Math.round(rvBasis * 0.093 * 100) / 100;
  const av = Math.round(rvBasis * 0.013 * 100) / 100;
  const kv = Math.round(kvBasis * 0.073 * 100) / 100;       // KV-Basisbeitrag
  const zvBei = Math.round(kvBasis * 0.0145 * 100) / 100;   // Zusatzbeitrag AN-Anteil (Ø 2.9%)
  // PV 2026: abhängig von Kinderzahl
  // 0 Kinder: 2.4%, 1 Kind: 1.8%, 2 Kinder: 1.55%, 3 Kinder: 1.3%, 4 Kinder: 1.05%, 5+: 0.8%
  const pvSaetze = [0.024, 0.018, 0.0155, 0.013, 0.0105, 0.008];
  const pvIdx = Math.min(Math.floor(kinder), 5);
  const pvSatz = pvSaetze[pvIdx];
  const pv = Math.round(kvBasis * pvSatz * 100) / 100;
  const svGesamt = rv + av + kv + zvBei + pv;

  // ── Lohnsteuer BMF PAP 2026 ──
  const GFB = sk === 3 ? 24696 : 12348;
  const bruttoJahr = bruttoMonat * 12;
  const rvJ = rvBasis * 12 * 0.093;
  const kvJ = kvBasis * 12 * (0.073 + 0.0145);
  const pvJ = kvBasis * 12 * pvSatz;
  const vpSV = rvJ + kvJ + pvJ;
  const vpMin = Math.min(bruttoJahr * 0.12, sk === 3 ? 3800 : 1900);
  const vp = Math.max(vpMin, vpSV);
  let zvE = bruttoJahr - 1230 - 36 - vp - GFB;
  zvE = Math.max(0, Math.floor(zvE / 36) * 36);

  let stJahr = 0;
  if (zvE <= 0) { stJahr = 0; }
  else if (zvE <= 17443) { const y=zvE/10000; stJahr=(922.98*y+1400)*y; }
  else if (zvE <= 68481) { const z=(zvE-17443)/10000; stJahr=(181.19*z+2397)*z+1025.97; }
  else if (zvE <= 277825) { stJahr=0.42*zvE-10602.13; }
  else { stJahr=0.45*zvE-18936.88; }
  stJahr = Math.floor(stJahr);
  if (sk === 3) stJahr = Math.floor(stJahr * 0.5);
  else if (sk === 5) stJahr = Math.floor(stJahr * 2.0);

  const lohnsteuerMonat = Math.max(0, stJahr / 12);

  // Soli 2026 (Freigrenze 20.350 €/Jahr)
  const soli = stJahr > 20350 ? Math.round(lohnsteuerMonat * 0.055 * 100) / 100 : 0;

  // Kirchensteuer
  const ks = Math.round(lohnsteuerMonat * (kirchensteuer ? (KIRCHENSTEUER_SATZ[bundesland]||0.09) : 0) * 100) / 100;

  const zusatzGesamt = (config.zusatzAbzuege||[]).reduce((s,a)=>s+Number(a.betrag||0),0);
  const abzuege = svGesamt + lohnsteuerMonat + soli + ks + zusatzGesamt;
  const r = v => Math.round(v * 100) / 100;

  return {
    brutto: bruttoMonat,
    rv: r(rv), av: r(av), kv: r(kv), zvBei: r(zvBei), pv: r(pv),
    svGesamt: r(svGesamt),
    lohnsteuer: r(lohnsteuerMonat),
    soli: r(soli),
    kirchensteuer: r(ks),
    zusatzAbzuege: config.zusatzAbzuege||[],
    zusatzGesamt: r(zusatzGesamt),
    abzuege: r(abzuege),
    netto: r(bruttoMonat - abzuege)
  };
}

const WEEKDAYS = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const MONTHS   = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

const inp = {
  width:"100%", padding:"12px 14px",
  background:"rgba(255,255,255,0.07)", border:"1px solid rgba(167,139,250,0.25)",
  borderRadius:12, color:"#fff", fontSize:16, outline:"none",
};
const navBtn = { background:"rgba(255,255,255,0.08)", border:"none", color:"#fff", borderRadius:8, padding:"6px 16px", fontSize:20, cursor:"pointer" };

function Stat({ label, value, accent }) {

    <div>
      <div style={{fontSize:11,color:"#6b7280",marginBottom:2,letterSpacing:1}}>{label}</div>
      <div style={{fontSize:16,fontWeight:700,color:accent?"#f59e0b":"#e8e0f0"}}>{value}</div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("erfassen");
  const [config, setConfig] = useState(() => { try { return JSON.parse(localStorage.getItem(CONFIG_KEY))||defaultConfig; } catch { return defaultConfig; }});
  const [eintraege, setEintraege] = useState(() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY))||{}; } catch { return {}; }});

  const today = new Date();
  const [selectedDate, setSelectedDate]   = useState(today.toISOString().slice(0,10));
  const [selectedMonth, setSelectedMonth] = useState({year:today.getFullYear(),month:today.getMonth()});
  const [selectedWeek, setSelectedWeek] = useState(()=>{ const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toISOString().slice(0,10); });
  const [selectedYear, setSelectedYear] = useState(today.getFullYear());
  const [subView, setSubView] = useState("arbeit");

  const tagestypen = config.tagestypen || DEFAULT_TAGESTYPEN;
  const eintrag = eintraege[selectedDate] || {start:config.defaultStart||"",ende:config.defaultEnde||"",pause:config.defaultPause||"30",notiz:"",kilometer:"",kraftstoff:"",kunden:"",typ:"arbeit"};
  const aktuellerTyp = tagestypen.find(t => t.id === (eintrag.typ||"arbeit")) || tagestypen[0];

  useEffect(()=>{ localStorage.setItem(STORAGE_KEY, JSON.stringify(eintraege)); },[eintraege]);
  useEffect(()=>{ localStorage.setItem(CONFIG_KEY,  JSON.stringify(config)); },[config]);

  function updateEintrag(field, value) {
    setEintraege(prev => ({...prev, [selectedDate]:{...eintrag,[field]:value}}));
  }

  const tagesErgebnis = aktuellerTyp.zaehlt ? berechneTag(eintrag, config) : null;

  const {year,month} = selectedMonth;
  const daysInMonth = new Date(year,month+1,0).getDate();
  let monatsGesamtMin=0,monatsNormal=0,monatsUeber=0,monatsLohn=0,monatsKm=0,monatsKraftstoff=0,monatsKunden=0,monatsAbholer=0,monatsSpesen=0,monatsUrlaub=0,monatsFeiertage=0,monatsKranktage=0,monatsUrlaubMin=0,monatsFeiertageMin=0,monatsKranktageMin=0;
  const monatsTage = [];
  for (let d=1; d<=daysInMonth; d++) {
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const eTyp = eintraege[dateStr]?.typ||"arbeit";
    const eTypObj = (config.tagestypen||DEFAULT_TAGESTYPEN).find(t=>t.id===eTyp)||DEFAULT_TAGESTYPEN[0];
    const e=eintraege[dateStr], res=(e && eTypObj.zaehlt)?berechneTag(e,config):null;
    if(res){monatsGesamtMin+=res.gesamtMin;monatsNormal+=res.normalStunden;monatsUeber+=res.ueberStunden;monatsLohn+=res.gesamtLohn;}
    // Bezahlte Abwesenheit (Urlaub, Krank, Kindkrank, Feiertag) = Regelarbeitszeit * Stundenlohn
    if(e && !res) {
      const typ = (config.tagestypen||DEFAULT_TAGESTYPEN).find(t=>t.id===(e.typ||"arbeit"));
      if(typ && typ.bezahlt && !typ.zaehlt) {
        const stunden = typ.bezahltStunden || config.regelarbeitszeit;
        monatsLohn += stunden * config.stundenlohn;
        if(typ.id==="urlaub") { monatsUrlaub++; monatsUrlaubMin+=stunden*60; }
        if(typ.id==="feiertag") { monatsFeiertage++; monatsFeiertageMin+=stunden*60; }
        if(typ.id==="krank" || typ.id==="kindkrank") { monatsKranktage++; monatsKranktageMin+=stunden*60; }
      }
    }
    if(e&&e.kilometer)  monatsKm         += Number(e.kilometer)||0;
    if(e&&e.kraftstoff) monatsKraftstoff += Number(e.kraftstoff)||0;
    if(e&&e.kunden)     monatsKunden     += Number(e.kunden)||0;
    if(e&&e.abholer)   monatsAbholer    += Number(e.abholer)||0;
    if(res && res.gesamtStunden >= (config.ueberstundenMindestStunden||8)) monatsSpesen += Number(config.spesenBetrag)||0;
    monatsTage.push({d,dateStr,e,res});
  }
  const nettoMonat = berechneNetto(monatsLohn, config);

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)",fontFamily:"'DM Mono','Courier New',monospace",color:"#e8e0f0",paddingBottom:90}}>

      {/* Header */}
      <div style={{padding:"36px 20px 16px",borderBottom:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.03)"}}>
        <div style={{fontSize:11,letterSpacing:4,color:"#a78bfa",textTransform:"uppercase",marginBottom:4}}>Zeiterfassung</div>
        <div style={{fontSize:26,fontWeight:700,letterSpacing:-0.5,color:"#fff"}}>WorkTracker</div>
      </div>

      <div style={{padding:"20px 16px",maxWidth:480,margin:"0 auto"}}>

        {/* ── ERFASSEN ── */}
        {view==="erfassen" && (
          <div>
            <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)}
              style={{...inp,fontSize:16,marginBottom:20,width:"100%"}} />

            <div style={{marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
              <span style={{background:"rgba(167,139,250,0.18)",color:"#a78bfa",borderRadius:8,padding:"4px 12px",fontSize:13,fontWeight:600,letterSpacing:1}}>
                {WEEKDAYS[new Date(selectedDate+"T12:00:00").getDay()]}
              </span>
              <span style={{color:"#9ca3af",fontSize:13}}>{selectedDate}</span>
            </div>

            {/* Tagestyp Auswahl */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>Tagestyp</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {tagestypen.filter(t=>t.aktiv!==false).map(typ=>(
                  <button key={typ.id} onClick={()=>updateEintrag("typ",typ.id)}
                    style={{padding:"7px 12px",borderRadius:20,border:"1px solid",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all 0.15s",
                      borderColor:eintrag.typ===typ.id||(!eintrag.typ&&typ.id==="arbeit")?typ.color:"rgba(255,255,255,0.12)",
                      background:eintrag.typ===typ.id||(!eintrag.typ&&typ.id==="arbeit")?`${typ.color}22`:"rgba(255,255,255,0.04)",
                      color:eintrag.typ===typ.id||(!eintrag.typ&&typ.id==="arbeit")?typ.color:"#6b7280"}}>
                    {typ.icon} {typ.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Zeitfelder nur wenn Typ "zaehlt" */}
            {aktuellerTyp.zaehlt && (<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              {[["start","Beginn"],["ende","Ende"]].map(([field,label])=>(
                <div key={field}>
                  <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>{label}</div>
                  <input type="time" value={eintrag[field]||""} onChange={e=>updateEintrag(field,e.target.value)}
                    style={{...inp,fontSize:18,width:"100%"}} />
                </div>
              ))}
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Pause (Minuten)</div>
              <input type="number" min="0" value={eintrag.pause} onChange={e=>updateEintrag("pause",e.target.value)}
                style={{...inp,width:"100%"}} />
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Tour</div>
              <input type="text" value={eintrag.tour||""} placeholder="z.B. Tour 1, Stadtgebiet..."
                onChange={e=>updateEintrag("tour",e.target.value)} style={{...inp,width:"100%"}} />
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Gefahrene Kilometer (km)</div>
              <input type="number" min="0" step="0.1" value={eintrag.kilometer||""} placeholder="0"
                onChange={e=>updateEintrag("kilometer",e.target.value)} style={{...inp,width:"100%"}} />
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Kraftstoff (L)</div>
                <input type="number" min="0" step="0.01" value={eintrag.kraftstoff||""} placeholder="0.00"
                  onChange={e=>updateEintrag("kraftstoff",e.target.value)} style={{...inp,width:"100%"}} />
              </div>
              <div>
                <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Kunden</div>
                <input type="number" min="0" value={eintrag.kunden||""} placeholder="0"
                  onChange={e=>updateEintrag("kunden",e.target.value)} style={{...inp,width:"100%"}} />
              </div>
              <div>
                <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Abholer</div>
                <input type="number" min="0" value={eintrag.abholer||""} placeholder="0"
                  onChange={e=>updateEintrag("abholer",e.target.value)} style={{...inp,width:"100%"}} />
              </div>
            </div>

            </>) }

            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Tagesnotiz</div>
              <textarea rows={4} value={eintrag.notiz||""} placeholder="Was war heute besonders?"
                onChange={e=>updateEintrag("notiz",e.target.value)}
                style={{...inp,width:"100%",resize:"vertical",lineHeight:1.6,fontSize:14}} />
            </div>

            {tagesErgebnis && (
              <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:14,textTransform:"uppercase"}}>Tagesergebnis</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Stat label="Arbeitszeit"      value={formatZeit(tagesErgebnis.gesamtMin, config.dezimalformat)} />
                  <Stat label="Überstunden"      value={formatZeit(Math.round(tagesErgebnis.ueberStunden*60), config.dezimalformat)} accent={tagesErgebnis.ueberStunden>0} />
                  <Stat label="Normallohn"        value={`€ ${tagesErgebnis.normalLohn.toFixed(2)}`} />
                  <Stat label="Überstundenzuschl." value={`€ ${tagesErgebnis.ueberLohn.toFixed(2)}`} accent={tagesErgebnis.ueberStunden>0} />
                </div>
                <div style={{marginTop:16,paddingTop:14,borderTop:"1px solid rgba(167,139,250,0.2)",display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <span style={{fontSize:13,color:"#a78bfa"}}>Gesamt Brutto</span>
                  <span style={{fontSize:26,fontWeight:700,color:"#c4b5fd"}}>€ {tagesErgebnis.gesamtLohn.toFixed(2)}</span>
                </div>
                {tagesErgebnis.gesamtStunden >= (config.ueberstundenMindestStunden||8) ? (
                  <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(52,211,153,0.1)",borderRadius:10,padding:"10px 14px",border:"1px solid rgba(52,211,153,0.3)"}}>
                    <span style={{fontSize:13,color:"#34d399"}}>🍽️ Spesen</span>
                    <span style={{fontSize:18,fontWeight:700,color:"#34d399"}}>+ € {Number(config.spesenBetrag).toFixed(2)}</span>
                  </div>
                ) : (
                  <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center",background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 14px",border:"1px solid rgba(255,255,255,0.06)"}}>
                    <span style={{fontSize:12,color:"#6b7280"}}>🍽️ Spesen (ab {config.ueberstundenMindestStunden||8}h)</span>
                    <span style={{fontSize:12,color:"#6b7280"}}>noch {formatZeit(Math.round(((config.ueberstundenMindestStunden||8) - tagesErgebnis.gesamtStunden)*60), config.dezimalformat)}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {/* ── MONAT ── */}
        {view==="monat" && (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <button onClick={()=>setSelectedMonth(prev=>{const d=new Date(prev.year,prev.month-1);return{year:d.getFullYear(),month:d.getMonth()};})} style={navBtn}>‹</button>
              <span style={{fontWeight:700,fontSize:18}}>{MONTHS[month]} {year}</span>
              <button onClick={()=>setSelectedMonth(prev=>{const d=new Date(prev.year,prev.month+1);return{year:d.getFullYear(),month:d.getMonth()};})} style={navBtn}>›</button>
            </div>

            <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20,marginBottom:20}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:14,textTransform:"uppercase"}}>Monatsübersicht</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <Stat label="Gesamtstunden" value={formatZeit(monatsGesamtMin, config.dezimalformat)} />
                <Stat label="Überstunden"   value={formatZeit(Math.round(monatsUeber*60), config.dezimalformat)} accent={monatsUeber>0} />
                <Stat label="Bruttolohn"    value={`€ ${monatsLohn.toFixed(2)}`} accent />
                <Stat label="Gefahrene km"  value={`${monatsKm.toFixed(1)} km`} />
                <Stat label="Kraftstoff"    value={`${monatsKraftstoff.toFixed(2)} L`} />
                <Stat label="Kunden gesamt" value={`${monatsKunden}`} />
                <Stat label="Abholer gesamt" value={`${monatsAbholer}`} />
                <Stat label="Spesen gesamt" value={`€ ${monatsSpesen.toFixed(2)}`} accent />
                <Stat label="🏖️ Urlaubstage" value={`${monatsUrlaub} Tage${monatsUrlaubMin>0?" / "+formatZeit(monatsUrlaubMin,config.dezimalformat):""}`} />
                <Stat label="🎉 Feiertage" value={`${monatsFeiertage} Tage${monatsFeiertageMin>0?" / "+formatZeit(monatsFeiertageMin,config.dezimalformat):""}`} />
                <Stat label="🤒 Kranktage" value={`${monatsKranktage} Tage${monatsKranktageMin>0?" / "+formatZeit(monatsKranktageMin,config.dezimalformat):""}`} />
              </div>
              <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(167,139,250,0.25)"}}>
                <Stat label="⏱ Stunden gesamt (inkl. Abwesenheiten)" value={formatZeit(monatsGesamtMin+monatsUrlaubMin+monatsFeiertageMin+monatsKranktageMin, config.dezimalformat)} accent />
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {monatsTage.filter(t=>t.e).map(({d,dateStr,res})=>{
                const wd=WEEKDAYS[new Date(dateStr+"T12:00:00").getDay()];
                return (
                  <div key={d} onClick={()=>{setSelectedDate(dateStr);setView("erfassen");}}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderRadius:12,padding:"12px 16px",cursor:"pointer",
                      background: (()=>{const tt=tagestypen.find(t=>t.id===(eintraege[dateStr]?.typ||"arbeit"))||tagestypen[0]; return `${tt.color}11`;})(),
                      border:`1px solid ${(()=>{const tt=tagestypen.find(t=>t.id===(eintraege[dateStr]?.typ||"arbeit"))||tagestypen[0]; return tt.color+'33';})()}`}}>
                    <div style={{display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{color:"#a78bfa",fontWeight:700,minWidth:24}}>{wd}</span>
                      <span style={{color:"#9ca3af",fontSize:13}}>{String(d).padStart(2,"0")}.{String(month+1).padStart(2,"0")}.</span>
                      {res ? <span style={{fontSize:13}}>{formatZeit(res.gesamtMin, config.dezimalformat)}</span>
                           : (()=>{const tt=tagestypen.find(t=>t.id===(eintraege[dateStr]?.typ||"arbeit"))||tagestypen[0]; return <span style={{fontSize:13}}>{tt.icon} {tt.label}{tt.bezahlt && !tt.zaehlt ? <span style={{color:"#a78bfa",marginLeft:4}}>{tt.bezahltStunden||config.regelarbeitszeit}h</span> : null}</span>; })()}
                    </div>
                    <div style={{textAlign:"right"}}>
                      {res && <div style={{fontWeight:700,color:"#c4b5fd"}}>€ {res.gesamtLohn.toFixed(2)}</div>}
                      {!res && (()=>{const tt=tagestypen.find(t=>t.id===(eintraege[dateStr]?.typ||"arbeit"))||tagestypen[0]; return tt.bezahlt && !tt.zaehlt ? <div style={{fontWeight:700,color:"#c4b5fd"}}>€ {((tt.bezahltStunden||config.regelarbeitszeit)*config.stundenlohn).toFixed(2)}</div> : null;})()}
                      {res && res.ueberStunden>0 && <div style={{fontSize:11,color:"#f59e0b"}}>+{formatZeit(Math.round(res.ueberStunden*60), config.dezimalformat)} ÜZ</div>}
                      {eintraege[dateStr]?.kilometer && <div style={{fontSize:11,color:"#60a5fa"}}>🚗 {eintraege[dateStr].kilometer} km</div>}
                      {eintraege[dateStr]?.kunden    && <div style={{fontSize:11,color:"#34d399"}}>📦 {eintraege[dateStr].kunden} Kunden</div>}
                      {eintraege[dateStr]?.abholer   && <div style={{fontSize:11,color:"#fb923c"}}>🚚 {eintraege[dateStr].abholer} Abholer</div>}
                      {res && res.gesamtStunden >= (config.ueberstundenMindestStunden||8) && <div style={{fontSize:11,color:"#34d399"}}>🍽️ Spesen € {Number(config.spesenBetrag).toFixed(2)}</div>}
                    </div>
                  </div>
                );
              })}
              {monatsTage.filter(t=>t.e).length===0 && (
                <div style={{textAlign:"center",color:"#6b7280",padding:40}}>Keine Einträge diesen Monat</div>
              )}
            </div>
          </div>
        )}

        {/* ── WOCHE ── */}
        {view==="woche" && (()=>{
          const wochenStart = new Date(selectedWeek+"T12:00:00");
          const wochenTage = Array.from({length:7},(_,i)=>{
            const d=new Date(wochenStart); d.setDate(d.getDate()+i);
            const dateStr=d.toISOString().slice(0,10);
            const e=eintraege[dateStr];
            const eTypObj=(config.tagestypen||DEFAULT_TAGESTYPEN).find(t=>t.id===(e?.typ||"arbeit"))||DEFAULT_TAGESTYPEN[0];
            const res=(e&&eTypObj.zaehlt)?berechneTag(e,config):null;
            return {d,dateStr,e,res,eTypObj};
          });
          const wocheGesamtMin=wochenTage.reduce((s,t)=>s+(t.res?.gesamtMin||0),0);
          const wocheUeber=wochenTage.reduce((s,t)=>s+(t.res?.ueberStunden||0),0);
          let wocheLohn=wochenTage.reduce((s,t)=>s+(t.res?.gesamtLohn||0),0);
          wochenTage.forEach(t=>{if(t.e&&!t.res&&t.eTypObj.bezahlt&&!t.eTypObj.zaehlt) wocheLohn+=(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*config.stundenlohn;});
          const wocheSpesen=wochenTage.reduce((s,t)=>s+(t.res&&t.res.gesamtStunden>=(config.ueberstundenMindestStunden||8)?Number(config.spesenBetrag):0),0);
          const wocheKm=wochenTage.reduce((s,t)=>s+(Number(t.e?.kilometer)||0),0);
          const wocheKunden=wochenTage.reduce((s,t)=>s+(Number(t.e?.kunden)||0),0);
          const wocheAbholer=wochenTage.reduce((s,t)=>s+(Number(t.e?.abholer)||0),0);
          const wocheUrlaubMin=wochenTage.reduce((s,t)=>s+(t.e&&!t.res&&t.eTypObj.id==="urlaub"?(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*60:0),0);
          const wocheFeiertageMin=wochenTage.reduce((s,t)=>s+(t.e&&!t.res&&t.eTypObj.id==="feiertag"?(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*60:0),0);
          const wocheKranktageMin=wochenTage.reduce((s,t)=>s+(t.e&&!t.res&&(t.eTypObj.id==="krank"||t.eTypObj.id==="kindkrank")?(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*60:0),0);
          const wocheUrlaub=wochenTage.filter(t=>t.e&&!t.res&&t.eTypObj.id==="urlaub").length;
          const wocheFeiertage=wochenTage.filter(t=>t.e&&!t.res&&t.eTypObj.id==="feiertag").length;
          const wocheKranktage=wochenTage.filter(t=>t.e&&!t.res&&(t.eTypObj.id==="krank"||t.eTypObj.id==="kindkrank")).length;

          const prevWeek=()=>{ const d=new Date(wochenStart); d.setDate(d.getDate()-7); setSelectedWeek(d.toISOString().slice(0,10)); };
          const nextWeek=()=>{ const d=new Date(wochenStart); d.setDate(d.getDate()+7); setSelectedWeek(d.toISOString().slice(0,10)); };
          const wocheEnde=new Date(wochenStart); wocheEnde.setDate(wocheEnde.getDate()+6);

          return (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                <button onClick={prevWeek} style={navBtn}>‹</button>
                <div style={{textAlign:"center"}}>
                  <div style={{fontWeight:700,fontSize:16}}>{wochenStart.getDate().toString().padStart(2,"0")}.{(wochenStart.getMonth()+1).toString().padStart(2,"0")} – {wocheEnde.getDate().toString().padStart(2,"0")}.{(wocheEnde.getMonth()+1).toString().padStart(2,"0")}.{wocheEnde.getFullYear()}</div>
                  <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>KW {(()=>{ const d=new Date(wochenStart); d.setHours(0,0,0,0); d.setDate(d.getDate()+4-(d.getDay()||7)); const y=new Date(d.getFullYear(),0,1); return Math.ceil((((d-y)/86400000)+1)/7); })()}</div>
                </div>
                <button onClick={nextWeek} style={navBtn}>›</button>
              </div>

              <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:14,textTransform:"uppercase"}}>Wochenübersicht</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Stat label="Gesamtstunden" value={formatZeit(wocheGesamtMin,config.dezimalformat)} />
                  <Stat label="Überstunden"   value={formatZeit(Math.round(wocheUeber*60),config.dezimalformat)} accent={wocheUeber>0} />
                  <Stat label="Bruttolohn"    value={`€ ${wocheLohn.toFixed(2)}`} accent />
                  <Stat label="Spesen"        value={`€ ${wocheSpesen.toFixed(2)}`} />
                  <Stat label="Gefahrene km"  value={`${wocheKm.toFixed(1)} km`} />
                  <Stat label="Kunden"        value={`${wocheKunden}`} />
                  <Stat label="Abholer"       value={`${wocheAbholer}`} />
                  {wocheUrlaub>0 && <Stat label="🏖️ Urlaubstage" value={`${wocheUrlaub} Tage${wocheUrlaubMin>0?" / "+formatZeit(wocheUrlaubMin,config.dezimalformat):""}`} />}
                  {wocheFeiertage>0 && <Stat label="🎉 Feiertage" value={`${wocheFeiertage} Tage${wocheFeiertageMin>0?" / "+formatZeit(wocheFeiertageMin,config.dezimalformat):""}`} />}
                  {wocheKranktage>0 && <Stat label="🤒 Kranktage" value={`${wocheKranktage} Tage${wocheKranktageMin>0?" / "+formatZeit(wocheKranktageMin,config.dezimalformat):""}`} />}
                </div>
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(167,139,250,0.25)"}}>
                  <Stat label="⏱ Stunden gesamt (inkl. Abwesenheiten)" value={formatZeit(wocheGesamtMin+wocheUrlaubMin+wocheFeiertageMin+wocheKranktageMin,config.dezimalformat)} accent />

              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {wochenTage.map(({d,dateStr,e,res,eTypObj})=>{

                    <div key={dateStr} onClick={()=>{setSelectedDate(dateStr);setView("erfassen");}}

                        background:e?`${eTypObj.color}11`:"rgba(255,255,255,0.03)",
                        border:`1px solid ${isToday?"#a78bfa":e?eTypObj.color+"33":"rgba(255,255,255,0.07)"}`,

                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <span style={{fontWeight:700,fontSize:15,color:isToday?"#a78bfa":e?eTypObj.color:"#6b7280",minWidth:28}}>{wd}</span>
                          <span style={{color:"#9ca3af",fontSize:13}}>{d.getDate().toString().padStart(2,"0")}.{(d.getMonth()+1).toString().padStart(2,"0")}.</span>
                          {e && !res && <span style={{fontSize:13}}>{eTypObj.icon} {eTypObj.label}</span>}
                          {e && !res && eTypObj.bezahlt && <span style={{fontSize:13,color:"#a78bfa",marginLeft:4}}>{eTypObj.bezahltStunden||config.regelarbeitszeit}h</span>}
                          {res && <span style={{fontSize:13,color:"#e8e0f0"}}>{formatZeit(res.gesamtMin,config.dezimalformat)}</span>}

                        </div>
                        <div style={{textAlign:"right"}}>
                          {res && <div style={{fontWeight:700,color:"#c4b5fd",fontSize:15}}>€ {res.gesamtLohn.toFixed(2)}</div>}
                          {e && !res && eTypObj.bezahlt && <div style={{fontWeight:700,color:"#c4b5fd",fontSize:15}}>€ {((eTypObj.bezahltStunden||config.regelarbeitszeit)*config.stundenlohn).toFixed(2)}</div>}
                          {res && res.ueberStunden>0 && <div style={{fontSize:11,color:"#f59e0b"}}>+{formatZeit(Math.round(res.ueberStunden*60),config.dezimalformat)} ÜZ</div>}

                          {e?.kilometer && <div style={{fontSize:11,color:"#60a5fa"}}>🚗 {e.kilometer} km</div>}
                        </div>
                      </div>
                      {e?.tour && <div style={{marginTop:6,fontSize:12,color:"#a78bfa"}}>🗺️ {e.tour}</div>}
                      {e?.notiz && <div style={{marginTop:4,fontSize:12,color:"#6b7280",fontStyle:"italic"}}>{e.notiz}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* ── JAHR ── */}
        {view==="jahr" && (()=>{
          const MONATE=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
          const MONATEFULL=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
          const tagestypen = config.tagestypen||DEFAULT_TAGESTYPEN;

          // Berechne alle 12 Monate
          const monatsDaten = MONATE.map((_,m)=>{
            const daysInMonth = new Date(selectedYear,m+1,0).getDate();
            let gesamtMin=0,ueberMin=0,lohn=0,spesen=0,km=0,kunden=0,abholer=0;
            let urlaub=0,feiertage=0,kranktage=0,urlaubMin=0,feiertageMin=0,kranktageMin=0,arbeitstage=0;
            for(let d=1;d<=daysInMonth;d++){
              const dateStr=`${selectedYear}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const e=eintraege[dateStr];
              if(!e) continue;
              const typ=tagestypen.find(t=>t.id===(e.typ||"arbeit"))||tagestypen[0];
              const res=typ.zaehlt?berechneTag(e,config):null;
              if(res){ gesamtMin+=res.gesamtMin; ueberMin+=Math.round(res.ueberStunden*60); lohn+=res.gesamtLohn; arbeitstage++; if(res.gesamtStunden>=(config.ueberstundenMindestStunden||8)) spesen+=Number(config.spesenBetrag); }
              if(!res&&typ.bezahlt&&!typ.zaehlt){ const h=typ.bezahltStunden||config.regelarbeitszeit; lohn+=h*config.stundenlohn; if(typ.id==="urlaub"){urlaub++;urlaubMin+=h*60;} if(typ.id==="feiertag"){feiertage++;feiertageMin+=h*60;} if(typ.id==="krank"||typ.id==="kindkrank"){kranktage++;kranktageMin+=h*60;} }
              km+=Number(e.kilometer)||0; kunden+=Number(e.kunden)||0; abholer+=Number(e.abholer)||0;
            }
            return {m,gesamtMin,ueberMin,lohn,spesen,km,kunden,abholer,urlaub,feiertage,kranktage,urlaubMin,feiertageMin,kranktageMin,arbeitstage};
          });

          // Jahressummen
          const jahresGesamtMin=monatsDaten.reduce((s,m)=>s+m.gesamtMin,0);
          const jahresUeberMin=monatsDaten.reduce((s,m)=>s+m.ueberMin,0);
          const jahresLohn=monatsDaten.reduce((s,m)=>s+m.lohn,0);
          const jahresSpesen=monatsDaten.reduce((s,m)=>s+m.spesen,0);
          const jahresKm=monatsDaten.reduce((s,m)=>s+m.km,0);
          const jahresKunden=monatsDaten.reduce((s,m)=>s+m.kunden,0);
          const jahresAbholer=monatsDaten.reduce((s,m)=>s+m.abholer,0);
          const jahresUrlaub=monatsDaten.reduce((s,m)=>s+m.urlaub,0);
          const jahresFeiertage=monatsDaten.reduce((s,m)=>s+m.feiertage,0);
          const jahresKranktage=monatsDaten.reduce((s,m)=>s+m.kranktage,0);
          const jahresUrlaubMin=monatsDaten.reduce((s,m)=>s+m.urlaubMin,0);
          const jahresFeiertageMin=monatsDaten.reduce((s,m)=>s+m.feiertageMin,0);
          const jahresKranktageMin=monatsDaten.reduce((s,m)=>s+m.kranktageMin,0);
          const jahresArbeitstage=monatsDaten.reduce((s,m)=>s+m.arbeitstage,0);
          const jahresGesamtInklMin=jahresGesamtMin+jahresUrlaubMin+jahresFeiertageMin+jahresKranktageMin;

          return (
            <div>
              {/* Jahr Navigation */}

                <div style={{fontWeight:700,fontSize:22}}>{selectedYear}</div>
                <button onClick={()=>setSelectedYear(y=>y+1)} style={navBtn}>›</button>
              </div>

              {/* Jahreszusammenfassung */}
              <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:14,textTransform:"uppercase"}}>Jahreszusammenfassung {selectedYear}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Stat label="Arbeitsstunden"  value={formatZeit(jahresGesamtMin,config.dezimalformat)} />
                  <Stat label="Überstunden"     value={formatZeit(jahresUeberMin,config.dezimalformat)} accent={jahresUeberMin>0} />
                  <Stat label="Bruttolohn"      value={`€ ${jahresLohn.toFixed(2)}`} accent />
                  <Stat label="Spesen"          value={`€ ${jahresSpesen.toFixed(2)}`} />
                  <Stat label="Arbeitstage"     value={`${jahresArbeitstage} Tage`} />
                  <Stat label="Gefahrene km"    value={`${jahresKm.toFixed(1)} km`} />
                  <Stat label="Kunden"          value={`${jahresKunden}`} />
                  <Stat label="Abholer"         value={`${jahresAbholer}`} />
                  {jahresUrlaub>0 && <Stat label="🏖️ Urlaub" value={`${jahresUrlaub} Tage / ${formatZeit(jahresUrlaubMin,config.dezimalformat)}`} />}
                  {jahresFeiertage>0 && <Stat label="🎉 Feiertage" value={`${jahresFeiertage} Tage / ${formatZeit(jahresFeiertageMin,config.dezimalformat)}`} />}
                  {jahresKranktage>0 && <Stat label="🤒 Kranktage" value={`${jahresKranktage} Tage / ${formatZeit(jahresKranktageMin,config.dezimalformat)}`} />}
                </div>
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(167,139,250,0.25)"}}>
                  <Stat label="⏱ Stunden gesamt (inkl. Abwesenheiten)" value={formatZeit(jahresGesamtInklMin,config.dezimalformat)} accent />
                </div>
              </div>

              {/* Monatsübersicht */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {monatsDaten.map(({m,gesamtMin,ueberMin,lohn,spesen,km,urlaubMin,feiertageMin,kranktageMin,arbeitstage})=>{
                  const monatGesamtInkl=gesamtMin+urlaubMin+feiertageMin+kranktageMin;
                  const hatDaten=monatGesamtInkl>0||lohn>0;
                  const istAktuellerMonat=m===today.getMonth()&&selectedYear===today.getFullYear();
                  return (
                    <div key={m} onClick={()=>{setSelectedMonth({year:selectedYear,month:m});setView("monat");}}
                      style={{borderRadius:14,padding:"14px 16px",cursor:"pointer",
                        background:hatDaten?"rgba(167,139,250,0.07)":"rgba(255,255,255,0.02)",
                        border:`1px solid ${istAktuellerMonat?"#a78bfa":hatDaten?"rgba(167,139,250,0.3)":"rgba(255,255,255,0.06)"}`,
                        outline:istAktuellerMonat?"2px solid rgba(167,139,250,0.3)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:15,color:istAktuellerMonat?"#a78bfa":hatDaten?"#e8e0f0":"#4b5563"}}>{MONATEFULL[m]}</div>
                          {hatDaten && <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{arbeitstage} Arbeitstage · {formatZeit(monatGesamtInkl,config.dezimalformat)}</div>}
                          {!hatDaten && <div style={{fontSize:12,color:"#374151"}}>Keine Einträge</div>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          {lohn>0 && <div style={{fontWeight:700,color:"#c4b5fd",fontSize:16}}>€ {lohn.toFixed(2)}</div>}
                          {ueberMin>0 && <div style={{fontSize:11,color:"#f59e0b"}}>+{formatZeit(ueberMin,config.dezimalformat)} ÜZ</div>}
                          {spesen>0 && <div style={{fontSize:11,color:"#34d399"}}>🍽️ € {spesen.toFixed(2)}</div>}
                          {km>0 && <div style={{fontSize:11,color:"#60a5fa"}}>🚗 {km.toFixed(1)} km</div>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* ── NETTO ── */}
        {view==="netto" && (
          <div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Brutto → Netto</div>
            <div style={{fontSize:12,color:"#9ca3af",marginBottom:20}}>Basierend auf dem Monatsbrutto von {MONTHS[month]} {year}</div>

            <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:10}}>
                <span style={{fontSize:11,letterSpacing:3,color:"#a78bfa",textTransform:"uppercase"}}>Bruttogehalt</span>
                <span style={{fontSize:22,fontWeight:700,color:"#fff"}}>€ {monatsLohn.toFixed(2)}</span>
              </div>
              <div style={{fontSize:11,color:"#6b7280"}}>
                SK {config.steuerklasse} · {BUNDESLAENDER.find(b=>b[0]===config.bundesland)?.[1]||config.bundesland}
                {config.kirchensteuer?" · Kirchensteuer":""}
                {Number(config.kinderfreibetrage)>0?` · ${config.kinderfreibetrage} Kinderfreibetrag`:""}
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:12}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:12,textTransform:"uppercase"}}>Sozialversicherung</div>
              {[["Rentenversicherung",nettoMonat.rv],["Arbeitslosenversicherung",nettoMonat.av],["Krankenversicherung (Basis)",nettoMonat.kv],["Krankenvers. Zusatzbeitrag",nettoMonat.zvBei],["Pflegeversicherung",nettoMonat.pv]].map(([label,val])=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#9ca3af"}}>{label}</span>
                  <span style={{color:"#f87171"}}>- € {val.toFixed(2)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.08)",fontWeight:700}}>
                <span style={{color:"#9ca3af"}}>SV gesamt</span>
                <span style={{color:"#f87171"}}>- € {nettoMonat.svGesamt.toFixed(2)}</span>
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:16}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:12,textTransform:"uppercase"}}>Steuern</div>
              {[["Lohnsteuer",nettoMonat.lohnsteuer],["Solidaritätszuschlag",nettoMonat.soli],...(config.kirchensteuer?[["Kirchensteuer",nettoMonat.kirchensteuer]]:[])].map(([label,val])=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#9ca3af"}}>{label}</span>
                  <span style={{color:"#f87171"}}>- € {val.toFixed(2)}</span>

              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:12,textTransform:"uppercase"}}>Zusatzabzüge</div>
                {nettoMonat.zusatzAbzuege.map((a,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                    <span style={{color:"#9ca3af"}}>{a.name||"Abzug"}</span>
                    <span style={{color:"#f87171"}}>- € {Number(a.betrag||0).toFixed(2)}</span>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.08)",fontWeight:700}}>
                  <span style={{color:"#9ca3af"}}>Gesamt</span>
                  <span style={{color:"#f87171"}}>- € {nettoMonat.zusatzGesamt.toFixed(2)}</span>
                </div>
              </div>
            )}
            <div style={{background:"linear-gradient(135deg,rgba(52,211,153,0.15),rgba(167,139,250,0.15))",border:"1px solid rgba(52,211,153,0.4)",borderRadius:16,padding:24,textAlign:"center"}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#34d399",marginBottom:8,textTransform:"uppercase"}}>Nettolohn</div>
              <div style={{fontSize:38,fontWeight:700,color:"#34d399"}}>€ {nettoMonat.netto.toFixed(2)}</div>
              <div style={{fontSize:12,color:"#9ca3af",marginTop:8}}>
                Abzüge: € {nettoMonat.abzuege.toFixed(2)} ({monatsLohn>0?((nettoMonat.abzuege/monatsLohn)*100).toFixed(1):0}%)
              </div>
            </div>

            {monatsLohn===0 && (
              <div style={{textAlign:"center",color:"#6b7280",padding:20,fontSize:13,marginTop:16}}>
                ⚠️ Erfasse zuerst Arbeitstage im gewählten Monat.
              </div>
            )}
          </div>
        )}

        {/* ── EINSTELLUNGEN ── */}
        {view==="einstellungen" && (
          <div>
            <div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Einstellungen</div>

            {/* Sub-Tabs */}
            <div style={{display:"flex",gap:8,marginBottom:24}}>
              {[["arbeit","💼 Arbeit"],["allgemein","⚙️ Allgemein"]].map(([id,label])=>(
                <button key={id} onClick={()=>setSubView(id)}
                  style={{flex:1,padding:"10px 0",borderRadius:12,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13,
                    borderColor:subView===id?"#a78bfa":"rgba(255,255,255,0.1)",
                    background:subView===id?"rgba(167,139,250,0.2)":"rgba(255,255,255,0.04)",
                    color:subView===id?"#c4b5fd":"#9ca3af"}}>
                  {label}
                </button>
              ))}
            </div>

            {/* ── ARBEITSEINSTELLUNGEN ── */}
            {subView==="arbeit" && (<div>
            {[{key:"stundenlohn",label:"Stundenlohn (€)",min:1,step:"0.5"},{key:"regelarbeitszeit",label:"Regelarbeitszeit (Std)",min:1,step:"0.1"},{key:"ueberstundenZuschlag",label:"Überstundenzuschlag (%)",min:0,step:"1"},{key:"ueberstundenMindestStunden",label:"Überstunden & Spesen ab (Stunden)",min:0,step:"0.1"}].map(({key,label,min,step})=>(
              <div key={key} style={{marginBottom:16}}>
                <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>{label}</div>
                <input type="number" min={min} step={step} value={config[key]}
                  onChange={e=>setConfig(prev=>({...prev,[key]:Number(e.target.value)}))}
                  style={{...inp,fontSize:18,width:"100%"}} />
              </div>
            ))}



            {/* Voreinstellungen Arbeitszeit */}
            <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginTop:28,marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20}}>
              Voreinstellungen Arbeitszeit
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>Wird automatisch beim Erfassen vorausgefüllt</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
              <div>
                <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Standard Beginn</div>
                <input type="time" value={config.defaultStart||"07:00"}
                  onChange={e=>setConfig(prev=>({...prev,defaultStart:e.target.value}))}
                  style={{...inp,width:"100%",fontSize:16}} />
              </div>
              <div>
                <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Standard Ende</div>
                <input type="time" value={config.defaultEnde||"15:36"}
                  onChange={e=>setConfig(prev=>({...prev,defaultEnde:e.target.value}))}
                  style={{...inp,width:"100%",fontSize:16}} />
              </div>
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Standard Pause (Minuten)</div>
              <input type="number" min="0" step="5" value={config.defaultPause||"30"}
                onChange={e=>setConfig(prev=>({...prev,defaultPause:e.target.value}))}
                style={{...inp,fontSize:18,width:"100%"}} />
            </div>

            {/* Spesen */}
            <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginTop:28,marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20}}>
              Spesen
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Spesenbetrag pro Tag (€)</div>
              <input type="number" min="0" step="0.50" value={config.spesenBetrag}
                onChange={e=>setConfig(prev=>({...prev,spesenBetrag:e.target.value}))}
                style={{...inp,fontSize:18,width:"100%"}} />
            </div>
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Mindestarbeitszeit für Spesen (Stunden)</div>
              <input type="number" min="0" step="0.5" value={config.spesenMindestStunden}
                onChange={e=>setConfig(prev=>({...prev,spesenMindestStunden:Number(e.target.value)}))}
                style={{...inp,fontSize:18,width:"100%"}} />
            </div>
            <div style={{padding:12,background:"rgba(52,211,153,0.08)",borderRadius:10,border:"1px solid rgba(52,211,153,0.2)",fontSize:13,color:"#9ca3af"}}>
              🍽️ Du erhältst <strong style={{color:"#34d399"}}>€ {Number(config.spesenBetrag).toFixed(2)}</strong> Spesen pro Tag ab <strong style={{color:"#34d399"}}>{config.spesenMindestStunden}h</strong> Arbeitszeit.
            </div>

            <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginTop:28,marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20}}>
              Tagestypen verwalten
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>Tippe auf einen Typ um Details zu bearbeiten</div>
            {(config.tagestypen||DEFAULT_TAGESTYPEN).map((typ,i)=>(
              <div key={typ.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:14,marginBottom:10,border:`1px solid ${typ.aktiv===false?"rgba(255,255,255,0.06)":typ.color+"44"}`,overflow:"hidden"}}>
                {/* Header Zeile */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{typ.icon}</span>
                    <div>
                      <div style={{fontWeight:600,fontSize:14,color:typ.aktiv===false?"#6b7280":typ.color}}>{typ.label}</div>
                      <div style={{fontSize:11,color:"#6b7280"}}>
                        {typ.zaehlt?"⏱ Arbeitszeit":typ.bezahlt?`💶 bezahlt (${typ.bezahltStunden||config.regelarbeitszeit}h)`:"– nicht bezahlt"}
                      </div>
                    </div>
                  </div>
                  {/* Aktiv-Toggle */}
                  <div onClick={()=>setConfig(prev=>{
                    const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];
                    tt[i]={...tt[i],aktiv:tt[i].aktiv===false?true:false};
                    return {...prev,tagestypen:tt};
                  })} style={{width:40,height:22,borderRadius:11,cursor:"pointer",background:typ.aktiv===false?"rgba(255,255,255,0.1)":typ.color,position:"relative",transition:"background 0.2s",flexShrink:0}}>
                    <div style={{position:"absolute",top:2,left:typ.aktiv===false?2:20,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                  </div>
                </div>

                {/* Bezahlung Einstellungen – nur wenn kein Arbeitstag */}
                {!typ.zaehlt && (
                  <div style={{borderTop:`1px solid ${typ.color}22`,padding:"12px 16px",background:"rgba(0,0,0,0.15)"}}>
                    <div style={{fontSize:11,color:"#a78bfa",letterSpacing:1,marginBottom:10,textTransform:"uppercase"}}>Vergütung</div>

                    {/* Bezahlt Toggle */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:typ.bezahlt?12:0}}>
                      <span style={{fontSize:13,color:"#9ca3af"}}>Wird bezahlt</span>
                      <div onClick={()=>setConfig(prev=>{
                        const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];
                        tt[i]={...tt[i],bezahlt:!tt[i].bezahlt};
                        return {...prev,tagestypen:tt};
                      })} style={{width:40,height:22,borderRadius:11,cursor:"pointer",background:typ.bezahlt?"#34d399":"rgba(255,255,255,0.1)",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                        <div style={{position:"absolute",top:2,left:typ.bezahlt?20:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                      </div>
                    </div>

                    {/* Bezahlte Stunden */}
                    {typ.bezahlt && (
                      <div>
                        <div style={{fontSize:12,color:"#6b7280",marginBottom:6}}>Bezahlte Stunden pro Tag</div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                          {[config.regelarbeitszeit, 4, 6, 8].filter((v,idx,arr)=>arr.indexOf(v)===idx).sort((a,b)=>a-b).map(h=>(
                            <button key={h} onClick={()=>setConfig(prev=>{
                              const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];
                              tt[i]={...tt[i],bezahltStunden:h};
                              return {...prev,tagestypen:tt};
                            })} style={{padding:"6px 14px",borderRadius:20,border:"1px solid",cursor:"pointer",fontSize:13,fontWeight:600,
                              borderColor:(typ.bezahltStunden||config.regelarbeitszeit)===h?typ.color:"rgba(255,255,255,0.15)",
                              background:(typ.bezahltStunden||config.regelarbeitszeit)===h?`${typ.color}22`:"rgba(255,255,255,0.04)",
                              color:(typ.bezahltStunden||config.regelarbeitszeit)===h?typ.color:"#6b7280"}}>
                              {h}h
                            </button>
                          ))}
                          {/* Eigene Stunden */}
                          <input type="number" min="0" step="0.5" placeholder="Eigene"
                            value={![config.regelarbeitszeit,4,6,8].includes(typ.bezahltStunden||config.regelarbeitszeit)?(typ.bezahltStunden||""):""}
                            onChange={e=>setConfig(prev=>{
                              const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];
                              tt[i]={...tt[i],bezahltStunden:Number(e.target.value)};
                              return {...prev,tagestypen:tt};
                            })}
                            style={{...inp,width:80,padding:"6px 10px",fontSize:13,textAlign:"center"}} />
                        </div>
                        <div style={{marginTop:10,fontSize:12,color:"#6b7280"}}>
                          = <strong style={{color:typ.color}}>€ {((typ.bezahltStunden||config.regelarbeitszeit)*config.stundenlohn).toFixed(2)}</strong> pro Tag
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}

            </div>)}

            {/* ── ALLGEMEINE EINSTELLUNGEN ── */}
            {subView==="allgemein" && (<div>

            {/* Urlaubsanspruch */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Urlaubsanspruch pro Jahr (Tage)</div>
              <input type="number" min="0" step="1" value={config.urlaubstageProJahr||28}
                onChange={e=>setConfig(prev=>({...prev,urlaubstageProJahr:Number(e.target.value)}))}
                style={{...inp,fontSize:18,width:"100%"}} />
            </div>

            {/* Urlaubsübersicht */}
            {(()=>{
              const thisYear = new Date().getFullYear();
              let used = 0;
              Object.entries(eintraege).forEach(([date,e])=>{
                if(date.startsWith(String(thisYear)) && e.typ==="urlaub") used++;
              });
              const remaining = (config.urlaubstageProJahr||28) - used;
              return (
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:24}}>
                  <div style={{background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.3)",borderRadius:12,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#38bdf8",marginBottom:4}}>Anspruch</div>
                    <div style={{fontSize:20,fontWeight:700,color:"#38bdf8"}}>{config.urlaubstageProJahr||28}</div>
                  </div>
                  <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:12,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#a78bfa",marginBottom:4}}>Genommen</div>
                    <div style={{fontSize:20,fontWeight:700,color:"#a78bfa"}}>{used}</div>
                  </div>
                  <div style={{background:remaining>0?"rgba(52,211,153,0.1)":"rgba(248,113,113,0.1)",border:`1px solid ${remaining>0?"rgba(52,211,153,0.3)":"rgba(248,113,113,0.3)"}`,borderRadius:12,padding:12,textAlign:"center"}}>
                    <div style={{fontSize:11,color:remaining>0?"#34d399":"#f87171",marginBottom:4}}>Rest</div>
                    <div style={{fontSize:20,fontWeight:700,color:remaining>0?"#34d399":"#f87171"}}>{remaining}</div>
                  </div>
                </div>
              );
            })()}

            {/* Zusatzabzüge */}
            <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20}}>
              Zusatzabzüge
            </div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>z.B. JobRad, Zusatzversicherung, VWL...</div>
            {(config.zusatzAbzuege||[]).map((abzug,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <input type="text" value={abzug.name} placeholder="Bezeichnung"
                  onChange={e=>{const a=[...(config.zusatzAbzuege||[])];a[i]={...a[i],name:e.target.value};setConfig(prev=>({...prev,zusatzAbzuege:a}));}}
                  style={{...inp,flex:2,fontSize:14}} />
                <input type="number" min="0" step="0.01" value={abzug.betrag} placeholder="€"
                  onChange={e=>{const a=[...(config.zusatzAbzuege||[])];a[i]={...a[i],betrag:e.target.value};setConfig(prev=>({...prev,zusatzAbzuege:a}));}}
                  style={{...inp,flex:1,fontSize:14}} />
                <button onClick={()=>{const a=[...(config.zusatzAbzuege||[])];a.splice(i,1);setConfig(prev=>({...prev,zusatzAbzuege:a}));}}
                  style={{background:"rgba(248,113,113,0.15)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:8,color:"#f87171",cursor:"pointer",padding:"10px 12px",fontSize:16,flexShrink:0}}>✕</button>
              </div>
            ))}
            <button onClick={()=>setConfig(prev=>({...prev,zusatzAbzuege:[...(prev.zusatzAbzuege||[]),{name:"",betrag:""}]}))}
              style={{width:"100%",padding:"12px",borderRadius:12,border:"1px dashed rgba(167,139,250,0.4)",background:"rgba(167,139,250,0.05)",color:"#a78bfa",cursor:"pointer",fontSize:14,fontFamily:"inherit",marginBottom:20}}>
              + Abzug hinzufügen
            </button>

            {/* App Einstellungen */}
            <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14}}>
              App Einstellungen
            </div>

            {/* Export / Import */}
            <div style={{marginBottom:16,background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"16px",border:"1px solid rgba(255,255,255,0.08)"}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:12,textTransform:"uppercase"}}>Datensicherung</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12,lineHeight:1.6}}>
                Exportiere deine Daten als Datei auf dein Handy und importiere sie bei Bedarf wieder – so gehen bei Browser-Reset keine Einträge verloren.
              </div>
              <button onClick={()=>{
                const data = { eintraege, config, exportDatum: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                const datum = new Date().toISOString().slice(0,10);
                a.href=url; a.download=`WorkTracker_Backup_${datum}.json`; a.click();
                URL.revokeObjectURL(url);
              }} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(52,211,153,0.4)",background:"rgba(52,211,153,0.08)",color:"#34d399",cursor:"pointer",fontSize:14,fontFamily:"inherit",marginBottom:10,fontWeight:600}}>
                📤 Daten exportieren (Backup)
              </button>
              <label style={{display:"block",width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(96,165,250,0.4)",background:"rgba(96,165,250,0.08)",color:"#60a5fa",cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:600,textAlign:"center",boxSizing:"border-box"}}>
                📥 Daten importieren (Wiederherstellen)
                <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                  const file=e.target.files[0]; if(!file) return;
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    try {
                      const data=JSON.parse(ev.target.result);
                      if(!data.eintraege) { alert("Ungültige Backup-Datei!"); return; }
                      if(window.confirm(`Backup vom ${data.exportDatum?new Date(data.exportDatum).toLocaleDateString("de-DE"):"?"} wiederherstellen?\n\nAlle aktuellen Daten werden überschrieben!`)) {
                        setEintraege(data.eintraege);
                        if(data.config) setConfig(data.config);
                        alert("✅ Daten erfolgreich wiederhergestellt!");
                      }
                    } catch { alert("Fehler beim Lesen der Datei!"); }
                  };
                  reader.readAsText(file);
                  e.target.value="";
                }} />
              </label>
            </div>

            {/* Tagestypen zurücksetzen */}
            <button onClick={()=>{ if(window.confirm("Tagestypen auf Standard zurücksetzen?")) setConfig(prev=>({...prev,tagestypen:DEFAULT_TAGESTYPEN})); }}
              style={{width:"100%",padding:"12px",borderRadius:12,border:"1px dashed rgba(248,113,113,0.4)",background:"rgba(248,113,113,0.05)",color:"#f87171",cursor:"pointer",fontSize:14,fontFamily:"inherit",marginBottom:16}}>
              🔄 Tagestypen zurücksetzen
            </button>
            {/* Zeitformat Toggle */}
            <div style={{marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.08)"}}>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>Dezimalformat</div>
                <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>
                  {config.dezimalformat ? "z.B. 8.50h statt 8h 30min" : "z.B. 8h 30min statt 8.50h"}
                </div>
              </div>
              <div onClick={()=>setConfig(prev=>({...prev,dezimalformat:!prev.dezimalformat}))}
                style={{width:48,height:26,borderRadius:13,cursor:"pointer",background:config.dezimalformat?"#a78bfa":"rgba(255,255,255,0.15)",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                <div style={{position:"absolute",top:3,left:config.dezimalformat?25:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
              </div>
            </div>

            <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14}}>
              Steuer &amp; Soziales
            </div>

            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:8,textTransform:"uppercase"}}>Steuerklasse</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {[1,2,3,4,5,6].map(sk=>(
                  <button key={sk} onClick={()=>setConfig(prev=>({...prev,steuerklasse:sk}))}
                    style={{padding:"10px 0",borderRadius:10,border:"1px solid",
                      borderColor:config.steuerklasse===sk?"#a78bfa":"rgba(255,255,255,0.1)",
                      background:config.steuerklasse===sk?"rgba(167,139,250,0.2)":"rgba(255,255,255,0.04)",
                      color:config.steuerklasse===sk?"#c4b5fd":"#9ca3af",
                      cursor:"pointer",fontWeight:700,fontSize:15}}>
                    SK {sk}
                  </button>
                ))}
              </div>
            </div>

            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Bundesland</div>
              <select value={config.bundesland} onChange={e=>setConfig(prev=>({...prev,bundesland:e.target.value}))}
                style={{...inp,width:"100%",fontSize:15}}>
                {BUNDESLAENDER.map(([code,name])=>(<option key={code} value={code}>{name}</option>))}
              </select>
            </div>

            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,color:"#a78bfa",letterSpacing:2,marginBottom:6,textTransform:"uppercase"}}>Kinderfreibeträge (Anzahl)</div>
              <input type="number" min="0" max="10" step="0.5" value={config.kinderfreibetrage}
                onChange={e=>setConfig(prev=>({...prev,kinderfreibetrage:e.target.value}))}
                style={{...inp,fontSize:18,width:"100%"}} />
            </div>

            <div style={{marginBottom:24,display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.08)"}}>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>Kirchensteuerpflichtig</div>
                <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>
                  {(config.bundesland==="BY"||config.bundesland==="BW")?"8%":"9%"} auf Lohnsteuer
                </div>
              </div>
              <div onClick={()=>setConfig(prev=>({...prev,kirchensteuer:!prev.kirchensteuer}))}
                style={{width:48,height:26,borderRadius:13,cursor:"pointer",background:config.kirchensteuer?"#a78bfa":"rgba(255,255,255,0.15)",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                <div style={{position:"absolute",top:3,left:config.kirchensteuer?25:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
              </div>
            </div>



            <div style={{padding:16,background:"rgba(167,139,250,0.08)",borderRadius:12,border:"1px solid rgba(167,139,250,0.2)",fontSize:13,color:"#9ca3af",lineHeight:1.6}}>
              Regelarbeitszeit <strong style={{color:"#c4b5fd"}}>{config.regelarbeitszeit}h</strong> · Überstunden & Spesen ab <strong style={{color:"#c4b5fd"}}>{config.ueberstundenMindestStunden}h</strong> · Zuschlag <strong style={{color:"#c4b5fd"}}>{config.ueberstundenZuschlag}%</strong> · Stundenlohn <strong style={{color:"#c4b5fd"}}>€ {config.stundenlohn}</strong>
            </div>
            </div>)}
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(15,12,41,0.97)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-around",padding:"10px 0 20px"}}>
        {[{id:"erfassen",icon:"⏱",label:"Erfassen"},{id:"woche",icon:"🗓️",label:"Woche"},{id:"monat",icon:"📅",label:"Monat"},{id:"jahr",icon:"📆",label:"Jahr"},{id:"netto",icon:"💶",label:"Netto"},{id:"einstellungen",icon:"⚙️",label:"Einstellungen"}].map(tab=>(
          <button key={tab.id} onClick={()=>setView(tab.id)}
            style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:view===tab.id?"#a78bfa":"#6b7280",fontSize:10,letterSpacing:0.5,transition:"color 0.2s",padding:"4px 8px"}}>
            <span style={{fontSize:20}}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
