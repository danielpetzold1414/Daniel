// Gibt den Stundenlohn zurück, der für ein bestimmtes Jahr/Monat gültig war.
// lohnVerlauf: [{ab: "YYYY-MM", lohn: number}] – ab = erster Gültigkeitsmonat (inkl.)
function getStundenlohnFuerMonat(config, year, month) {
  const verlauf = (config.lohnVerlauf || []).slice().sort((a,b) => a.ab < b.ab ? -1 : 1);
  const monatStr = `${year}-${String(month+1).padStart(2,"0")}`;
  let lohn = config.stundenlohn;
  for (const eintrag of verlauf) {
    if (eintrag.ab <= monatStr) lohn = Number(eintrag.lohn);
  }
  return lohn;
}

function parseTime(str) {
  if (!str) return null;
  const [h, m] = str.split(":").map(Number);
  return h * 60 + m;
}
function formatMinutes(min) {
  const h = Math.floor(Math.abs(min) / 60);
  const m = Math.abs(min) % 60;
  return `${h}h ${m.toString().padStart(2,"0")}min`;
}

function formatZeit(min, dezimal) {
  if (dezimal) {
    const h = Math.abs(min) / 60;
    return `${h.toFixed(2)}h`;
  }
  const h = Math.floor(Math.abs(min) / 60);
  const m = Math.abs(min) % 60;
  return `${h}h ${m.toString().padStart(2,"0")}min`;
}

function berechneNachtMinuten(workStart, workEnde, nachtStart, nachtEnde) {
  const ws = workStart;
  const we = workEnde <= workStart ? workEnde + 1440 : workEnde;
  const ns = nachtStart;
  const ne = nachtEnde <= nachtStart ? nachtEnde + 1440 : nachtEnde;
  let overlap = 0;
  for (const offset of [0, 1440, -1440]) {
    const nsO = ns + offset, neO = ne + offset;
    const s = Math.max(ws, nsO);
    const e = Math.min(we, neO);
    if (e > s) overlap += e - s;
  }
  return overlap;
}

function berechneTag(eintrag, config, stundenlohnOverride) {
  const start = parseTime(eintrag.start), ende = parseTime(eintrag.ende);
  const pause = Number(eintrag.pause) || 0;
  if (start === null || ende === null) return null;
  const gesamtMin = ende - start - pause;
  if (gesamtMin <= 0) return null;
  const gesamtStunden = gesamtMin / 60;
  const ueberGrenze = config.ueberstundenMindestStunden || config.regelarbeitszeit;
  const normalStunden = Math.min(gesamtStunden, ueberGrenze);
  const ueberStunden  = Math.max(0, gesamtStunden - ueberGrenze);
  const sl = stundenlohnOverride !== undefined ? stundenlohnOverride : config.stundenlohn;
  const normalLohn = normalStunden * sl;
  const ueberLohn  = ueberStunden  * sl * (1 + config.ueberstundenZuschlag / 100);
  let nachtLohn = 0, nachtStunden = 0;
  const nachtZuschlagProzent = Number(config.nachtschichtzulage) || 0;
  if (nachtZuschlagProzent > 0) {
    const ns = parseTime(config.defaultNachtStart || "22:00");
    const ne = parseTime(config.defaultNachtEnde  || "06:00");
    const rohNachtMin = berechneNachtMinuten(start, ende, ns, ne);
    nachtStunden = Math.max(0, rohNachtMin / 60);
    nachtLohn = nachtStunden * sl * (nachtZuschlagProzent / 100);
  }
  return { gesamtMin, gesamtStunden, normalStunden, ueberStunden, normalLohn, ueberLohn, nachtLohn, nachtStunden, gesamtLohn: normalLohn + ueberLohn + nachtLohn };
}

// Berechnet monatliche Überstunden (UPS-Methode):
// Alle Arbeitsstunden des Monats minus Monatssoll (Wochenstunden × Arbeitstage/5)
function berechneMonatlUeberstunden(eintraege, config, year, month, tagestypen, stundenlohn) {
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const wochenAZ = Number(config.wochenArbeitszeit) || 38.0;
  let arbeitstage = 0, gesamtMin = 0, nachtLohn = 0, spesen = 0, kleider = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const e = eintraege[dateStr];
    if (!e) continue;
    const typ = (tagestypen||[]).find(t => t.id === (e.typ||"arbeit")) || {zaehlt:true};
    if (!typ.zaehlt) continue;
    const res = berechneTag(e, config, stundenlohn);
    if (!res) continue;
    arbeitstage++;
    gesamtMin += res.gesamtMin;
    nachtLohn += res.nachtLohn || 0;
    if (res.gesamtStunden >= (Number(config.spesenMindestStunden) || 7.6)) spesen += Number(config.spesenBetrag) || 0;
    kleider += Number(config.kleiderreinigungBetrag) || 0;
  }
  const gesamtStunden = gesamtMin / 60;
  const monatsSoll = wochenAZ * (arbeitstage / 5);
  const normalStunden = Math.min(gesamtStunden, monatsSoll);
  const ueberStunden = Math.max(0, gesamtStunden - monatsSoll);
  const normLohn = normalStunden * stundenlohn;
  const mehrLohn = ueberStunden * stundenlohn;
  const ueberZuschlag = ueberStunden * stundenlohn * (Number(config.ueberstundenZuschlag) / 100);
  return { gesamtStunden, normalStunden, ueberStunden, monatsSoll, normLohn, mehrLohn, ueberZuschlag, nachtLohn, spesen, kleider, arbeitstage, gesamtMin, gesamtLohn: normLohn + mehrLohn + ueberZuschlag + nachtLohn };
}

function berechneEffektivlohn(eintraege, config, bisMonat, bisJahr) {
  // Manuellen Effektivlohn verwenden wenn eingestellt
  if (Number(config.manuellerEffektivlohn) > 0) return Number(config.manuellerEffektivlohn);
  // Effektivlohn = Gesamtbrutto letzte 3 Monate ÷ (Arbeitstage × Regelarbeitszeit)
  let gesamtLohn = 0, gesamtSollStunden = 0;
  const tagestypen = config.tagestypen || DEFAULT_TAGESTYPEN;
  for (let i = 1; i <= 3; i++) {
    let m = bisMonat - i;
    let y = bisJahr;
    if (m < 0) { m += 12; y -= 1; }
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const dayOfWeek = new Date(y, m, d).getDay();
      // Nur Montag–Freitag zählen als Sollarbeitstage
      if (dayOfWeek === 0 || dayOfWeek === 6) continue;
      const e = eintraege[dateStr];
      if (!e) continue;
      const typ = tagestypen.find(t => t.id === (e.typ || "arbeit")) || tagestypen[0];
      // Lohn summieren (Arbeitstage + bezahlte Abwesenheiten)
      const slM = getStundenlohnFuerMonat(config, y, m);
      if (typ.zaehlt) {
        const res = berechneTag(e, config, slM);
        // Gesamtlohn (inkl. Zuschläge) / Sollstunden wie UPS
        if (res) { gesamtLohn += res.gesamtLohn; gesamtSollStunden += config.regelarbeitszeit; }
      } else if (typ.bezahlt) {
        const h = typ.bezahltStunden || config.regelarbeitszeit;
        gesamtLohn += h * slM;
        gesamtSollStunden += config.regelarbeitszeit;
      }
    }
  }
  if (gesamtSollStunden < 1) return config.stundenlohn;
  return gesamtLohn / gesamtSollStunden;
}

const KIRCHENSTEUER_SATZ = {
  BY:0.08,BW:0.08,BE:0.09,BB:0.09,HB:0.09,HH:0.09,HE:0.09,
  MV:0.09,NI:0.09,NW:0.09,RP:0.09,SL:0.09,SN:0.09,ST:0.09,SH:0.09,TH:0.09

function berechneNetto(bruttoMonat, spesenMonat, config, jahresBrutto, jahresSpesen) {
  const bavM = Number(config.bav) || 0;
  const bruttoAbzuegeM = (config.zusatzAbzuege||[]).filter(a=>a.typ==="brutto").reduce((s,a)=>s+Number(a.betrag||0),0);
  // Brutto-Zusatzbezüge (z.B. Sachbezug BKV, VwL AG) erhöhen das Steuerbrutto,
  // werden aber NICHT bar ausgezahlt → separat führen
  const sachbezugBrutto = (config.zusatzBezuege||[]).filter(a=>(a.typ||"brutto")==="brutto").reduce((s,a)=>s+Number(a.betrag||0),0);
  const steuerBrutto = Math.max(0, bruttoMonat - bavM - bruttoAbzuegeM + sachbezugBrutto);
  const { steuerklasse, kirchensteuer, bundesland, kinderfreibetrage } = config;
  const sk = Number(steuerklasse);
  const kinder = Number(kinderfreibetrage) || 0;

  // SV auf Steuerbrutto (nach bAV-Abzug) - wie UPS Abrechnung
  const BBG_RV = 96600/12, BBG_KV = 69750/12;
  const rvBasis = Math.min(steuerBrutto, BBG_RV);
  const kvBasis = Math.min(steuerBrutto, BBG_KV);
  const kvZusatzSatz = (Number(config.kvZusatz)||2.98)/100/2;
  // KV-Basissatz AN: Standard 7.3%, aber per Tarifvertrag kann AG mehr übernehmen
  const kvBasissatz = (Number(config.kvBasissatz)||7.3)/100;
  const rv    = Math.round(rvBasis * 0.093  * 100)/100;
  const av    = Math.round(rvBasis * 0.013  * 100)/100;
  const kv    = Math.round(kvBasis * kvBasissatz * 100)/100;
  const zvBei = Math.round(kvBasis * kvZusatzSatz * 100)/100;
  // PV 2026: Satz hängt von EIGENEN Kindern ab (nicht Kinderfreibeträge!)
  // Kinderlos ab 23J: 1.80% AN | 1 Kind: 1.30% | 2K: 1.05% | 3K: 0.80% | 4K: 0.55% | 5+K: 0.30%
  const eigenKinder = Number(config.eigenKinder) || 0;
  const pvSaetze2026 = [0.0180, 0.0130, 0.0105, 0.0080, 0.0055, 0.0030];
  const pvIdx = Math.min(eigenKinder, 5);
  const pvSatz = pvSaetze2026[pvIdx];
  const pv = Math.round(kvBasis * pvSatz * 100)/100;
  const svGesamt = rv+av+kv+pv;
  const svGesamtMitZV = svGesamt+zvBei;

  // Lohnsteuer auf Steuerbrutto × 12 (inkl. Sachbezüge wie UPS)
  const jbSteuer = steuerBrutto * 12;
  const GFB = sk === 3 ? 24696 : 12348;
  let zvE = jbSteuer - GFB;
  zvE = Math.max(0, Math.floor(zvE / 36) * 36);

  // Tarifformel PAP 2026
  let stJahr = 0;
  if (zvE <= 0) { stJahr = 0; }
  else if (zvE <= 17443) { const y=zvE/10000; stJahr=Math.floor((922.98*y+1400)*y); }
  else if (zvE <= 68481) { const z=(zvE-17443)/10000; stJahr=Math.floor((181.19*z+2397)*z+1025.97); }
  else if (zvE <= 277825) { stJahr=Math.floor(0.42*zvE-10602.13); }
  else { stJahr=Math.floor(0.45*zvE-18936.88); }

  if (sk===3) stJahr=Math.floor(stJahr/2);
  else if (sk===5) stJahr=stJahr*2;

  const lohnsteuerMonat = Math.max(0, stJahr/12);
  const soli = stJahr > 20350 ? Math.round(lohnsteuerMonat*0.055*100)/100 : 0;
  const ks   = Math.round(lohnsteuerMonat*(kirchensteuer?(KIRCHENSTEUER_SATZ[bundesland]||0.09):0)*100)/100;

  const zusatzGesamt = (config.zusatzAbzuege||[]).filter(a=>(a.typ||"netto")==="netto").reduce((s,a)=>s+Number(a.betrag||0),0);
  const vlM = Number(config.vl) || 0;
  const zusatzBezuegeNetto = (config.zusatzBezuege||[]).filter(a=>(a.typ||"brutto")==="netto").reduce((s,a)=>s+Number(a.betrag||0),0);
  const abzuege = svGesamtMitZV+lohnsteuerMonat+soli+ks+zusatzGesamt+vlM;
  const spesenM = spesenMonat || 0;
  const r = v => Math.round(v*100)/100;
  // Netto-Auszahlung: Arbeitslohn-Brutto (ohne Sachbezüge) - Abzüge + Spesen + Netto-Bezüge
  // Sachbezüge (brutto) werden nicht bar ausgezahlt → NICHT addieren
  const nettoAuszahlung = r(bruttoMonat - abzuege + spesenM + zusatzBezuegeNetto);

  return {
    brutto: bruttoMonat, steuerBrutto: r(steuerBrutto), sachbezugBrutto: r(sachbezugBrutto),
    rv:r(rv), av:r(av), kv:r(kv), zvBei:r(zvBei), pv:r(pv),
    svGesamt:r(svGesamt), svGesamtMitZV:r(svGesamtMitZV),
    lohnsteuer:r(lohnsteuerMonat), soli:r(soli), kirchensteuer:r(ks),
    zusatzAbzuege:config.zusatzAbzuege||[], zusatzGesamt:r(zusatzGesamt),
    zusatzBezuegeNetto:r(zusatzBezuegeNetto),
    spesen:r(spesenM),
    abzuege:r(abzuege), netto:nettoAuszahlung
  };
}

  const {year,month} = selectedMonth;

  let monatsGesamtMin=0,monatsNormal=0,monatsUeber=0,monatsLohn=0,monatsKm=0,monatsKraftstoff=0,monatsKunden=0,monatsAbholer=0,monatsSpesen=0,monatsKleider=0,monatsUrlaub=0,monatsFeiertage=0,monatsKranktage=0,monatsUrlaubMin=0,monatsFeiertageMin=0,monatsKranktageMin=0,monatsNachtStunden=0,monatsNachtLohn=0,monatsTrinkgeld=0,monatsPatienten=0,monatsGefahren=0,monatsGeldeinnahmen=0;

  // Monatliche Überstunden-Methode (z.B. UPS)
  const slM = getStundenlohnFuerMonat(config, selectedYear, selectedMonth);
  if (config.ueberstundenMonatlich) {
    const mRes = berechneMonatlUeberstunden(eintraege, config, selectedYear, selectedMonth, tagestypen, slM);
    monatsGesamtMin = mRes.gesamtMin;
    monatsNormal    = mRes.normalStunden * 60;
    monatsUeber     = mRes.ueberStunden * 60;
    monatsLohn      = mRes.gesamtLohn;
    monatsSpesen    = mRes.spesen;
    monatsKleider   = mRes.kleider;
    monatsNachtLohn = mRes.nachtLohn;
  }
  const monatsTage = [];
  const effektivlohn = berechneEffektivlohn(eintraege, config, month, year);
  // Zusatzbezüge zum Brutto addieren
  const zusatzBezuegeBrutto = (config.zusatzBezuege||[]).filter(a=>(a.typ||"brutto")==="brutto").reduce((s,a)=>s+Number(a.betrag||0),0);
  for (let d=1; d<=daysInMonth; d++) {
    const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const eTyp = eintraege[dateStr]?.typ||"arbeit";
    const eTypObj = (config.tagestypen||DEFAULT_TAGESTYPEN).find(t=>t.id===eTyp)||DEFAULT_TAGESTYPEN[0];
    const slTag = getStundenlohnFuerMonat(config, year, month);
    const e=eintraege[dateStr], res=(e && eTypObj.zaehlt)?berechneTag(e,config,slTag):null;
    if(res && eTypObj.zaehlt){monatsGesamtMin+=res.gesamtMin;monatsNormal+=res.normalStunden;monatsUeber+=res.ueberStunden;monatsLohn+=res.gesamtLohn;monatsNachtStunden+=res.nachtStunden||0;monatsNachtLohn+=res.nachtLohn||0;}
    // Bezahlte Abwesenheit (Urlaub, Krank, Kindkrank, Feiertag) = Effektivlohn – unabhängig ob Zeiten eingetragen
    if(e && !eTypObj.zaehlt) {
      const typ = (config.tagestypen||DEFAULT_TAGESTYPEN).find(t=>t.id===(e.typ||"arbeit"));
      if(typ && typ.bezahlt) {
        const stunden = typ.bezahltStunden || config.regelarbeitszeit;
        monatsLohn += stunden * effektivlohn;
        if(typ.id==="urlaub") { monatsUrlaub++; monatsUrlaubMin+=stunden*60; }
        if(typ.id==="feiertag") { monatsFeiertage++; monatsFeiertageMin+=stunden*60; }
        if(typ.id==="krank" || typ.id==="kindkrank") { monatsKranktage++; monatsKranktageMin+=stunden*60; }
      }
    }
    if(e&&e.kilometer)  monatsKm         += Number(e.kilometer)||0;
    if(e&&e.kraftstoff) monatsKraftstoff += Number(e.kraftstoff)||0;
    if(e&&e.kunden)     monatsKunden     += Number(e.kunden)||0;
    if(e&&e.abholer)   monatsAbholer    += Number(e.abholer)||0;
    if(e&&e.trinkgeld)  monatsTrinkgeld     += Number(e.trinkgeld)||0;
    if(e&&e.patienten)  monatsPatienten     += Number(e.patienten)||0;
    if(e&&e.nachname)   monatsGeldeinnahmen += Number(e.nachname)||0;
    if(e&&e.startkilometer&&e.endkilometer) monatsGefahren += Math.max(0,Number(e.endkilometer)-Number(e.startkilometer));
    if(!config.ueberstundenMonatlich) {
      if(res && res.gesamtStunden >= (config.ueberstundenMindestStunden||8)) monatsSpesen += Number(config.spesenBetrag)||0;
      if(res) monatsKleider += Number(config.kleiderreinigungBetrag)||0;
    }
    monatsTage.push({d,dateStr,e,res});
  }
  // Einmalzahlungen dieses Monats
  const einmaligKey = `${year}-${String(month+1).padStart(2,"0")}`;
  const einmaligEintraege = eintraege[`__einmalig__${einmaligKey}`] || [];

                      {eintraege[dateStr]?.kunden    && <div style={{fontSize:11,color:"#34d399"}}>📦 {eintraege[dateStr].kunden} Kunden</div>}
                      {eintraege[dateStr]?.abholer   && <div style={{fontSize:11,color:"#fb923c"}}>🚚 {eintraege[dateStr].abholer} Abholer</div>}
                      {eintraege[dateStr]?.trinkgeld && <div style={{fontSize:11,color:"#fbbf24"}}>💰 € {Number(eintraege[dateStr].trinkgeld).toFixed(2)}</div>}
                      {eintraege[dateStr]?.nachname && <div style={{fontSize:11,color:"#4ade80"}}>💵 € {Number(eintraege[dateStr].nachname).toFixed(2)}</div>}
                      {eintraege[dateStr]?.patienten && <div style={{fontSize:11,color:"#f0abfc"}}>🏥 {eintraege[dateStr].patienten}</div>}
                      {eintraege[dateStr]?.einsatzort && <div style={{fontSize:11,color:"#94a3b8"}}>📌 {eintraege[dateStr].einsatzort}</div>}
                      {eintraege[dateStr]?.projekt && <div style={{fontSize:11,color:"#86efac"}}>📁 {eintraege[dateStr].projekt}</div>}
                      {res && res.gesamtStunden >= (config.ueberstundenMindestStunden||8) && <div style={{fontSize:11,color:"#34d399"}}>🍽️ Spesen € {Number(config.spesenBetrag).toFixed(2)}</div>}
                    </div>
                  </div>
                );
              })}
              {monatsTage.filter(t=>t.e).length===0 && (
                <div style={{textAlign:"center",color:"#6b7280",padding:40}}>{t("keine_eintraege_monat")}</div>
              )}
            </div>
          </div>
        )}

        {/* ── WOCHE ── */}
        {view==="woche" && (()=>{
          const wochenStart = new Date(selectedWeek+"T12:00:00");
          const wochenTage = Array.from({length:7},(_,i)=>{
            const d=new Date(wochenStart); d.setDate(d.getDate()+i);
            const dateStr=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            const e=eintraege[dateStr];
            const eTypObj=(config.tagestypen||DEFAULT_TAGESTYPEN).find(t=>t.id===(e?.typ||"arbeit"))||DEFAULT_TAGESTYPEN[0];
            const slWTag = getStundenlohnFuerMonat(config, d.getFullYear(), d.getMonth());
            const res=(e&&eTypObj.zaehlt)?berechneTag(e,config,slWTag):null;
            return {d,dateStr,e,res,eTypObj};
          });
          const wocheGesamtMin=wochenTage.reduce((s,t)=>s+(t.res?.gesamtMin||0),0);
          const wocheUeber=wochenTage.reduce((s,t)=>s+(t.res?.ueberStunden||0),0);
          const wocheNachtStunden=wochenTage.reduce((s,t)=>s+(t.res?.nachtStunden||0),0);
          const wocheNachtLohn=wochenTage.reduce((s,t)=>s+(t.res?.nachtLohn||0),0);
          const wocheEffektivlohn = berechneEffektivlohn(eintraege, config, wochenStart.getMonth(), wochenStart.getFullYear());
          let wocheLohn=wochenTage.reduce((s,t)=>s+(t.res?.gesamtLohn||0),0);
          wochenTage.forEach(t=>{if(t.e&&!t.res&&t.eTypObj.bezahlt&&!t.eTypObj.zaehlt) wocheLohn+=(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*wocheEffektivlohn;});
          const wocheSpesen=wochenTage.reduce((s,t)=>s+(t.res&&t.res.gesamtStunden>=(config.ueberstundenMindestStunden||8)?Number(config.spesenBetrag):0),0);
          const wocheKm=wochenTage.reduce((s,t)=>s+(Number(t.e?.kilometer)||0),0);
          const wocheKunden=wochenTage.reduce((s,t)=>s+(Number(t.e?.kunden)||0),0);
          const wocheAbholer=wochenTage.reduce((s,t)=>s+(Number(t.e?.abholer)||0),0);
          const wocheTrinkgeld=wochenTage.reduce((s,t)=>s+(Number(t.e?.trinkgeld)||0),0);
          const wochePatienten=wochenTage.reduce((s,t)=>s+(Number(t.e?.patienten)||0),0);
          const wocheGeldeinnahmen=wochenTage.reduce((s,t)=>s+(Number(t.e?.nachname)||0),0);
          const wocheGefahren=wochenTage.reduce((s,t)=>s+(t.e?.startkilometer&&t.e?.endkilometer?Math.max(0,Number(t.e.endkilometer)-Number(t.e.startkilometer)):0),0);
          const wocheUrlaubMin=wochenTage.reduce((s,t)=>s+(t.e&&!t.res&&t.eTypObj.id==="urlaub"?(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*60:0),0);
          const wocheFeiertageMin=wochenTage.reduce((s,t)=>s+(t.e&&!t.res&&t.eTypObj.id==="feiertag"?(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*60:0),0);
          const wocheKranktageMin=wochenTage.reduce((s,t)=>s+(t.e&&!t.res&&(t.eTypObj.id==="krank"||t.eTypObj.id==="kindkrank")?(t.eTypObj.bezahltStunden||config.regelarbeitszeit)*60:0),0);
          const wocheUrlaub=wochenTage.filter(t=>t.e&&!t.res&&t.eTypObj.id==="urlaub").length;
          const wocheFeiertage=wochenTage.filter(t=>t.e&&!t.res&&t.eTypObj.id==="feiertag").length;
          const wocheKranktage=wochenTage.filter(t=>t.e&&!t.res&&(t.eTypObj.id==="krank"||t.eTypObj.id==="kindkrank")).length;

          const prevWeek=()=>{ const d=new Date(wochenStart); d.setDate(d.getDate()-7); setSelectedWeek(d.toISOString().slice(0,10)); };
          const nextWeek=()=>{ const d=new Date(wochenStart); d.setDate(d.getDate()+7); setSelectedWeek(d.toISOString().slice(0,10)); };
          const wocheEnde=new Date(wochenStart); wocheEnde.setDate(wocheEnde.getDate()+6);

          return (
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                <button onClick={prevWeek} style={navBtn}>‹</button>
                <div style={{textAlign:"center"}}>
                  <div style={{fontWeight:700,fontSize:16}}>{wochenStart.getDate().toString().padStart(2,"0")}.{(wochenStart.getMonth()+1).toString().padStart(2,"0")} – {wocheEnde.getDate().toString().padStart(2,"0")}.{(wocheEnde.getMonth()+1).toString().padStart(2,"0")}.{wocheEnde.getFullYear()}</div>
                  <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{t("kw")} {(()=>{ const d=new Date(wochenStart); d.setHours(0,0,0,0); d.setDate(d.getDate()+4-(d.getDay()||7)); const y=new Date(d.getFullYear(),0,1); return Math.ceil((((d-y)/86400000)+1)/7); })()}</div>
                </div>
                <button onClick={nextWeek} style={navBtn}>›</button>
              </div>

              <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:14,textTransform:"uppercase"}}>{t("wochenuebersicht")}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Stat label={t("gesamtstunden")} value={formatZeit(wocheGesamtMin,config.dezimalformat)} />
                  <Stat label={t("ueberstunden")}   value={formatZeit(Math.round(wocheUeber*60),config.dezimalformat)} accent={wocheUeber>0} />
                  {wocheNachtStunden>0 && <Stat label={t("nachtstunden")} value={formatZeit(Math.round(wocheNachtStunden*60),config.dezimalformat)} />}
                  {wocheNachtLohn>0 && <Stat label={t("nachtzulage")} value={`€ ${wocheNachtLohn.toFixed(2)}`} />}
                  <Stat label={t("bruttolohn")}    value={`€ ${wocheLohn.toFixed(2)}`} accent />
                  <Stat label={t("spesen")}        value={`€ ${wocheSpesen.toFixed(2)}`} />
                  <Stat label={t("gefahrene_km")}  value={`${wocheKm.toFixed(1)} km`} />
                  {wocheGefahren>0 && <Stat label="🔢→🏁 Gefahren" value={`${wocheGefahren.toFixed(0)} km`} />}
                  <Stat label={t("kunden")}        value={`${wocheKunden}`} />
                  <Stat label={t("abholer")}       value={`${wocheAbholer}`} />
                  {wocheTrinkgeld>0 && <Stat label={t("trinkgeld_gesamt")} value={`€ ${wocheTrinkgeld.toFixed(2)}`} accent />}
                  {wocheGeldeinnahmen>0 && <Stat label={t("nachname")} value={`€ ${wocheGeldeinnahmen.toFixed(2)}`} accent />}
                  {wochePatienten>0 && <Stat label={t("patienten_gesamt")} value={`${wochePatienten}`} />}
                  {wocheUrlaub>0 && <Stat label={t("urlaubstage")} value={`${wocheUrlaub} ${t("tage")}${wocheUrlaubMin>0?" / "+formatZeit(wocheUrlaubMin,config.dezimalformat):""}`} />}
                  {wocheFeiertage>0 && <Stat label={t("feiertage")} value={`${wocheFeiertage} ${t("tage")}${wocheFeiertageMin>0?" / "+formatZeit(wocheFeiertageMin,config.dezimalformat):""}`} />}
                  {wocheKranktage>0 && <Stat label={t("kranktage")} value={`${wocheKranktage} ${t("tage")}${wocheKranktageMin>0?" / "+formatZeit(wocheKranktageMin,config.dezimalformat):""}`} />}
                </div>
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(167,139,250,0.25)"}}>
                  <Stat label={t("stunden_inkl")} value={formatZeit(wocheGesamtMin+wocheUrlaubMin+wocheFeiertageMin+wocheKranktageMin,config.dezimalformat)} accent />
                </div>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {wochenTage.map(({d,dateStr,e,res,eTypObj})=>{
                  const wd=WEEKDAYS[d.getDay()];
                  const isToday=dateStr===today.toISOString().slice(0,10);
                  return (
                    <div key={dateStr} onClick={()=>{setSelectedDate(dateStr);setView("erfassen");}}
                      style={{borderRadius:14,padding:"14px 16px",cursor:"pointer",
                        background:e?`${eTypObj.color}11`:"rgba(255,255,255,0.03)",
                        border:`1px solid ${isToday?"#a78bfa":e?eTypObj.color+"33":"rgba(255,255,255,0.07)"}`,
                        outline:isToday?"2px solid rgba(167,139,250,0.4)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",gap:10,alignItems:"center"}}>
                          <span style={{fontWeight:700,fontSize:15,color:isToday?"#a78bfa":e?eTypObj.color:"#6b7280",minWidth:28}}>{wd}</span>
                          <span style={{color:"#9ca3af",fontSize:13}}>{d.getDate().toString().padStart(2,"0")}.{(d.getMonth()+1).toString().padStart(2,"0")}.</span>
                          {e && !res && <span style={{fontSize:13}}>{eTypObj.icon} {eTypObj.label}</span>}
                          {e && !res && eTypObj.bezahlt && <span style={{fontSize:13,color:"#a78bfa",marginLeft:4}}>{eTypObj.bezahltStunden||config.regelarbeitszeit}h</span>}
                          {res && <span style={{fontSize:13,color:"#e8e0f0"}}>{formatZeit(res.gesamtMin,config.dezimalformat)}</span>}
                          {!e && <span style={{fontSize:12,color:"#4b5563"}}>{t("nicht_erfasst")}</span>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          {res && <div style={{fontWeight:700,color:"#c4b5fd",fontSize:15}}>€ {res.gesamtLohn.toFixed(2)}</div>}
                          {e && !res && eTypObj.bezahlt && <div style={{fontWeight:700,color:"#c4b5fd",fontSize:15}}>€ {((eTypObj.bezahltStunden||config.regelarbeitszeit)*config.stundenlohn).toFixed(2)}</div>}
                          {res && res.ueberStunden>0 && <div style={{fontSize:11,color:"#f59e0b"}}>+{formatZeit(Math.round(res.ueberStunden*60),config.dezimalformat)} {t("uez")}</div>}
                          {res && res.nachtLohn>0 && <div style={{fontSize:11,color:"#818cf8"}}>🌙 +€ {res.nachtLohn.toFixed(2)}</div>}
                          {res && res.gesamtStunden>=(config.ueberstundenMindestStunden||8) && <div style={{fontSize:11,color:"#34d399"}}>🍽️ € {Number(config.spesenBetrag).toFixed(2)}</div>}
                          {e?.kilometer && <div style={{fontSize:11,color:"#60a5fa"}}>🚗 {e.kilometer} km</div>}
                          {e?.startkilometer && e?.endkilometer && <div style={{fontSize:11,color:"#60a5fa"}}>🔢→🏁 {Math.max(0,Number(e.endkilometer)-Number(e.startkilometer))} km</div>}
                          {e?.trinkgeld && <div style={{fontSize:11,color:"#fbbf24"}}>💰 € {Number(e.trinkgeld).toFixed(2)}</div>}
                          {e?.patienten && <div style={{fontSize:11,color:"#f0abfc"}}>🏥 {e.patienten}</div>}
                          {e?.einsatzort && <div style={{fontSize:11,color:"#94a3b8"}}>📌 {e.einsatzort}</div>}
                          {e?.fahrzeug && <div style={{fontSize:11,color:"#94a3b8"}}>🚗 {e.fahrzeug}</div>}
                          {e?.projekt && <div style={{fontSize:11,color:"#86efac"}}>📁 {e.projekt}</div>}
                        </div>
                      </div>
                      {e?.tour && <div style={{marginTop:6,fontSize:12,color:"#a78bfa"}}>🗺️ {e.tour}</div>}
                      {e?.notiz && <div style={{marginTop:4,fontSize:12,color:"#6b7280",fontStyle:"italic"}}>{e.notiz}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* ── JAHR ── */}
        {view==="jahr" && (()=>{
          const MONATE=T.months_short;
          const MONATEFULL=T.months;
          const tagestypen = config.tagestypen||DEFAULT_TAGESTYPEN;

          // Berechne alle 12 Monate
          const monatsDaten = MONATE.map((_,m)=>{
            const daysInMonth = new Date(selectedYear,m+1,0).getDate();
            const slJ = getStundenlohnFuerMonat(config, selectedYear, m);
            let gesamtMin=0,ueberMin=0,lohn=0,spesen=0,km=0,kunden=0,abholer=0,trinkgeld=0,patienten=0,gefahren=0,geldeinnahmen=0;
            let urlaub=0,feiertage=0,kranktage=0,urlaubMin=0,feiertageMin=0,kranktageMin=0,arbeitstage=0;

            if(config.ueberstundenMonatlich) {
              const mRes = berechneMonatlUeberstunden(eintraege, config, selectedYear, m, tagestypen, slJ);
              gesamtMin = mRes.gesamtMin;
              ueberMin  = Math.round(mRes.ueberStunden * 60);
              lohn      = mRes.gesamtLohn;
              spesen    = mRes.spesen;
              arbeitstage = mRes.arbeitstage;
            }

            for(let d=1;d<=daysInMonth;d++){
              const dateStr=`${selectedYear}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
              const e=eintraege[dateStr];
              if(!e) continue;
              const typ=tagestypen.find(t=>t.id===(e.typ||"arbeit"))||tagestypen[0];
              if(!config.ueberstundenMonatlich) {
                const res=typ.zaehlt?berechneTag(e,config,slJ):null;
                if(res){ gesamtMin+=res.gesamtMin; ueberMin+=Math.round(res.ueberStunden*60); lohn+=res.gesamtLohn; arbeitstage++; if(res.gesamtStunden>=(config.ueberstundenMindestStunden||8)) spesen+=Number(config.spesenBetrag); }
              }
              if(!typ.zaehlt&&typ.bezahlt){ const h=typ.bezahltStunden||config.regelarbeitszeit; const el=berechneEffektivlohn(eintraege,config,m,selectedYear); lohn+=h*el; if(typ.id==="urlaub"){urlaub++;urlaubMin+=h*60;} if(typ.id==="feiertag"){feiertage++;feiertageMin+=h*60;} if(typ.id==="krank"||typ.id==="kindkrank"){kranktage++;kranktageMin+=h*60;} }
              km+=Number(e.kilometer)||0; kunden+=Number(e.kunden)||0; abholer+=Number(e.abholer)||0;
              trinkgeld+=Number(e.trinkgeld)||0; patienten+=Number(e.patienten)||0;
              geldeinnahmen+=Number(e.nachname)||0;
              if(e.startkilometer&&e.endkilometer) gefahren+=Math.max(0,Number(e.endkilometer)-Number(e.startkilometer));
            }
            return {m,gesamtMin,ueberMin,lohn,spesen,km,kunden,abholer,trinkgeld,patienten,geldeinnahmen,gefahren,urlaub,feiertage,kranktage,urlaubMin,feiertageMin,kranktageMin,arbeitstage};
          });

          // Jahressummen
          const jahresGesamtMin=monatsDaten.reduce((s,m)=>s+m.gesamtMin,0);
          const jahresUeberMin=monatsDaten.reduce((s,m)=>s+m.ueberMin,0);
          const jahresLohn=monatsDaten.reduce((s,m)=>s+m.lohn,0);
          const jahresSpesen=monatsDaten.reduce((s,m)=>s+m.spesen,0);
          const jahresKm=monatsDaten.reduce((s,m)=>s+m.km,0);
          const jahresKunden=monatsDaten.reduce((s,m)=>s+m.kunden,0);
          const jahresAbholer=monatsDaten.reduce((s,m)=>s+m.abholer,0);
          const jahresTrinkgeld=monatsDaten.reduce((s,m)=>s+m.trinkgeld,0);
          const jahresPatienten=monatsDaten.reduce((s,m)=>s+m.patienten,0);
          const jahresGeldeinnahmen=monatsDaten.reduce((s,m)=>s+m.geldeinnahmen,0);
          const jahresGefahren=monatsDaten.reduce((s,m)=>s+m.gefahren,0);
          const jahresUrlaub=monatsDaten.reduce((s,m)=>s+m.urlaub,0);
          const jahresFeiertage=monatsDaten.reduce((s,m)=>s+m.feiertage,0);
          const jahresKranktage=monatsDaten.reduce((s,m)=>s+m.kranktage,0);
          const jahresUrlaubMin=monatsDaten.reduce((s,m)=>s+m.urlaubMin,0);
          const jahresFeiertageMin=monatsDaten.reduce((s,m)=>s+m.feiertageMin,0);
          const jahresKranktageMin=monatsDaten.reduce((s,m)=>s+m.kranktageMin,0);
          const jahresArbeitstage=monatsDaten.reduce((s,m)=>s+m.arbeitstage,0);
          const jahresGesamtInklMin=jahresGesamtMin+jahresUrlaubMin+jahresFeiertageMin+jahresKranktageMin;

          return (
            <div>
              {/* Jahr Navigation */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
                <button onClick={()=>setSelectedYear(y=>y-1)} style={navBtn}>‹</button>
                <div style={{fontWeight:700,fontSize:22}}>{selectedYear}</div>
                <button onClick={()=>setSelectedYear(y=>y+1)} style={navBtn}>›</button>
              </div>

              {/* Jahreszusammenfassung */}
              <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:14,textTransform:"uppercase"}}>{t("jahresuebersicht")} {selectedYear}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <Stat label={t("arbeitszeit")}  value={formatZeit(jahresGesamtMin,config.dezimalformat)} />
                  <Stat label={t("ueberstunden")}     value={formatZeit(jahresUeberMin,config.dezimalformat)} accent={jahresUeberMin>0} />
                  <Stat label={t("bruttolohn")}      value={`€ ${jahresLohn.toFixed(2)}`} accent />
                  <Stat label={t("spesen")}          value={`€ ${jahresSpesen.toFixed(2)}`} />
                  <Stat label={t("arbeitstage")}     value={`${jahresArbeitstage} ${t("tage")}`} />
                  <Stat label={t("gefahrene_km")}    value={`${jahresKm.toFixed(1)} km`} />
                  {jahresGefahren>0 && <Stat label="🔢→🏁 Gefahren" value={`${jahresGefahren.toFixed(0)} km`} />}
                  <Stat label={t("kunden")}          value={`${jahresKunden}`} />
                  <Stat label={t("abholer")}         value={`${jahresAbholer}`} />
                  {jahresTrinkgeld>0 && <Stat label={t("trinkgeld_gesamt")} value={`€ ${jahresTrinkgeld.toFixed(2)}`} accent />}
                  {jahresGeldeinnahmen>0 && <Stat label={t("nachname")} value={`€ ${jahresGeldeinnahmen.toFixed(2)}`} accent />}
                  {jahresPatienten>0 && <Stat label={t("patienten_gesamt")} value={`${jahresPatienten}`} />}
                  {jahresUrlaub>0 && <Stat label={t("urlaubstage")} value={`${jahresUrlaub} ${t("tage")} / ${formatZeit(jahresUrlaubMin,config.dezimalformat)}`} />}
                  {jahresFeiertage>0 && <Stat label={t("feiertage")} value={`${jahresFeiertage} ${t("tage")} / ${formatZeit(jahresFeiertageMin,config.dezimalformat)}`} />}
                  {jahresKranktage>0 && <Stat label={t("kranktage")} value={`${jahresKranktage} ${t("tage")} / ${formatZeit(jahresKranktageMin,config.dezimalformat)}`} />}
                </div>
                <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid rgba(167,139,250,0.25)"}}>
                  <Stat label={t("stunden_inkl")} value={formatZeit(jahresGesamtInklMin,config.dezimalformat)} accent />
                </div>
              </div>

              {/* Monatsübersicht */}
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {monatsDaten.map(({m,gesamtMin,ueberMin,lohn,spesen,km,urlaubMin,feiertageMin,kranktageMin,arbeitstage})=>{
                  const monatGesamtInkl=gesamtMin+urlaubMin+feiertageMin+kranktageMin;
                  const hatDaten=monatGesamtInkl>0||lohn>0;
                  const istAktuellerMonat=m===today.getMonth()&&selectedYear===today.getFullYear();
                  return (
                    <div key={m} onClick={()=>{setSelectedMonth({year:selectedYear,month:m});setView("monat");}}
                      style={{borderRadius:14,padding:"14px 16px",cursor:"pointer",
                        background:hatDaten?"rgba(167,139,250,0.07)":"rgba(255,255,255,0.02)",
                        border:`1px solid ${istAktuellerMonat?"#a78bfa":hatDaten?"rgba(167,139,250,0.3)":"rgba(255,255,255,0.06)"}`,
                        outline:istAktuellerMonat?"2px solid rgba(167,139,250,0.3)":"none"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:15,color:istAktuellerMonat?"#a78bfa":hatDaten?"#e8e0f0":"#4b5563"}}>{MONATEFULL[m]}</div>
                          {hatDaten && <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{arbeitstage} {t("arbeitstage")} · {formatZeit(monatGesamtInkl,config.dezimalformat)}</div>}
                          {!hatDaten && <div style={{fontSize:12,color:"#374151"}}>{t("keine_eintraege")}</div>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          {lohn>0 && <div style={{fontWeight:700,color:"#c4b5fd",fontSize:16}}>€ {lohn.toFixed(2)}</div>}
                          {ueberMin>0 && <div style={{fontSize:11,color:"#f59e0b"}}>+{formatZeit(ueberMin,config.dezimalformat)} {t("uez")}</div>}
                          {spesen>0 && <div style={{fontSize:11,color:"#34d399"}}>🍽️ € {spesen.toFixed(2)}</div>}
                          {km>0 && <div style={{fontSize:11,color:"#60a5fa"}}>🚗 {km.toFixed(1)} km</div>}
                          {monatsDaten.find(md=>md.m===m)?.gefahren>0 && <div style={{fontSize:11,color:"#60a5fa"}}>🔢→🏁 {monatsDaten.find(md=>md.m===m).gefahren.toFixed(0)} km</div>}
                          {monatsDaten.find(md=>md.m===m)?.trinkgeld>0 && <div style={{fontSize:11,color:"#fbbf24"}}>💰 € {monatsDaten.find(md=>md.m===m).trinkgeld.toFixed(2)}</div>}
                          {monatsDaten.find(md=>md.m===m)?.geldeinnahmen>0 && <div style={{fontSize:11,color:"#4ade80"}}>💵 € {monatsDaten.find(md=>md.m===m).geldeinnahmen.toFixed(2)}</div>}
                          {monatsDaten.find(md=>md.m===m)?.patienten>0 && <div style={{fontSize:11,color:"#f0abfc"}}>🏥 {monatsDaten.find(md=>md.m===m).patienten}</div>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* ── NETTO ── */}
        {view==="netto" && (()=>{
          const prevMonthNetto=()=>setSelectedMonth(prev=>{const m=prev.month-1<0?11:prev.month-1;const y=prev.month-1<0?prev.year-1:prev.year;return{year:y,month:m};});
          const nextMonthNetto=()=>setSelectedMonth(prev=>{const m=prev.month+1>11?0:prev.month+1;const y=prev.month+1>11?prev.year+1:prev.year;return{year:y,month:m};});
          // Detaillierte Stundenaufschlüsselung für den Monat
          const nettoEffektivlohn = berechneEffektivlohn(eintraege, config, month, year);
          const bruttoAbzuegeTotal = (config.zusatzAbzuege||[]).filter(a=>a.typ==="brutto").reduce((s,a)=>s+Number(a.betrag||0),0);
          let nt_normalMin=0, nt_ueberMin=0, nt_urlaubMin=0, nt_feierMin=0, nt_krankMin=0, nt_kindkrankMin=0, nt_spesen=0, nt_nachtLohn=0, nt_nachtStunden=0;
          const tagestypenN = config.tagestypen||DEFAULT_TAGESTYPEN;
          const daysInMonthN = new Date(year,month+1,0).getDate();
          for(let d=1;d<=daysInMonthN;d++){
            const dateStr=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const e=eintraege[dateStr]; if(!e) continue;
            const typ=tagestypenN.find(t=>t.id===(e.typ||"arbeit"))||tagestypenN[0];
            const slN = getStundenlohnFuerMonat(config, year, month);
            if(typ.zaehlt){
              const res=berechneTag(e,config,slN);
              if(res){ nt_normalMin+=res.normalStunden*60; nt_ueberMin+=res.ueberStunden*60; nt_nachtLohn+=res.nachtLohn||0; nt_nachtStunden+=(res.nachtStunden||0); if(res.gesamtStunden>=(config.ueberstundenMindestStunden||8)) nt_spesen+=Number(config.spesenBetrag)||0; }
            } else if(typ.bezahlt){
              const h=(typ.bezahltStunden||config.regelarbeitszeit)*60;
              if(typ.id==="urlaub") nt_urlaubMin+=h;
              else if(typ.id==="feiertag") nt_feierMin+=h;
              else if(typ.id==="kindkrank") nt_kindkrankMin+=h;
              else if(typ.id==="krank") nt_krankMin+=h;
            }
          }
          const slNetto = getStundenlohnFuerMonat(config, year, month);
          const nt_normalLohn = (nt_normalMin/60)*slNetto;
          const nt_ueberLohn  = (nt_ueberMin/60)*slNetto;
          const nt_ueberZuschlag = (nt_ueberMin/60)*slNetto*(config.ueberstundenZuschlag/100);
          const nt_urlaubLohn = (nt_urlaubMin/60)*nettoEffektivlohn;
          const nt_feierLohn  = (nt_feierMin/60)*nettoEffektivlohn;
          const nt_krankLohn  = (nt_krankMin/60)*nettoEffektivlohn;
          const nt_kindkrankLohn = (nt_kindkrankMin/60)*nettoEffektivlohn;

          const AufschlRow = ({label, stunden, satz, betrag, color="#9ca3af"}) => stunden > 0 ? (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:13}}>
              <div>
                <span style={{color}}>{label}</span>
                <span style={{color:"#4b5563",fontSize:11,marginLeft:8}}>{stunden.toFixed(2)}h × € {satz.toFixed(2)}</span>
              </div>
              <span style={{color:"#e8e0f0",fontWeight:600}}>€ {betrag.toFixed(2)}</span>
            </div>
          ) : null;

          return (
          <div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <button onClick={prevMonthNetto} style={navBtn}>‹</button>
              <div style={{textAlign:"center"}}>
                <div style={{fontWeight:700,fontSize:18}}>Brutto → Netto</div>
                <div style={{fontSize:13,color:"#a78bfa"}}>{T.months[month]} {year}</div>
              </div>
              <button onClick={nextMonthNetto} style={navBtn}>›</button>
            </div>

            {/* Stundenaufschlüsselung */}
            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:12}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:14,textTransform:"uppercase"}}>{t("lohnberechnung")}</div>
              <AufschlRow label={t("normalstunden")}        stunden={nt_normalMin/60}    satz={slNetto}                              betrag={nt_normalLohn} />
              <AufschlRow label={t("ueberstunden_label")}          stunden={nt_ueberMin/60}     satz={slNetto}                              betrag={nt_ueberLohn} color="#f59e0b"/>
              <AufschlRow label={`${t("ueberstunden_label")} ${t("zuschlag_summary")} ${config.ueberstundenZuschlag}%`} stunden={nt_ueberMin/60} satz={slNetto*(config.ueberstundenZuschlag/100)} betrag={nt_ueberZuschlag} color="#f59e0b"/>
              {nt_nachtLohn>0 && <AufschlRow label={`🌙 ${t("nachtschicht_kurz").replace("🌙 ","")} ${Number(config.nachtschichtzulage)||25}%`} stunden={nt_nachtStunden} satz={slNetto*((Number(config.nachtschichtzulage)||25)/100)} betrag={nt_nachtLohn} color="#818cf8"/>}
              <AufschlRow label={t("urlaubslohn")}          stunden={nt_urlaubMin/60}    satz={nettoEffektivlohn}                               betrag={nt_urlaubLohn} color="#34d399"/>
              <AufschlRow label={t("feiertagsbez")}   stunden={nt_feierMin/60}     satz={nettoEffektivlohn}                               betrag={nt_feierLohn} color="#60a5fa"/>
              <AufschlRow label={t("kranklohn")}            stunden={nt_krankMin/60}     satz={nettoEffektivlohn}                               betrag={nt_krankLohn} color="#f87171"/>
              <AufschlRow label={t("kindkrank_bez")}   stunden={nt_kindkrankMin/60} satz={nettoEffektivlohn}                               betrag={nt_kindkrankLohn} color="#f87171"/>
              {(config.zusatzBezuege||[]).filter(a=>(a.typ||"brutto")==="brutto"&&Number(a.betrag)>0).map((b,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#34d399"}}>{b.name||"Zusatzbezug"}</span>
                  <span style={{color:"#e8e0f0",fontWeight:600}}>€ {Number(b.betrag).toFixed(2)}</span>
                </div>
              ))}
              {nt_spesen>0 && (
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#a78bfa"}}>{t("spesen_steuerfrei")}</span>
                  <span style={{color:"#e8e0f0",fontWeight:600}}>€ {nt_spesen.toFixed(2)}</span>
                </div>
              )}
              {einmaligBrutto>0 && (
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#f59e0b"}}>{t("einmalig_brutto")}</span>
                  <span style={{color:"#e8e0f0",fontWeight:600}}>+ € {einmaligBrutto.toFixed(2)}</span>
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.08)",fontWeight:700,fontSize:14}}>
                <span style={{color:"#a78bfa"}}>{t("gesamtbrutto")}</span>
                <span style={{color:"#fff"}}>€ {(monatsLohn+zusatzBezuegeBrutto+einmaligBrutto).toFixed(2)}</span>
              </div>
              {nettoEffektivlohn !== config.stundenlohn && (
                <div style={{marginTop:8,fontSize:11,color:"#6b7280"}}>{t("effektivlohn")} <strong style={{color:"#a78bfa"}}>€ {nettoEffektivlohn.toFixed(2)}/h</strong> {t("durchschnitt")}</div>
              )}
            </div>

            {/* Einmalzahlungen Verwaltung */}
            {(()=>{
              const einmaligKeyN = `${year}-${String(month+1).padStart(2,"0")}`;
              const storageKey = `__einmalig__${einmaligKeyN}`;
              const liste = eintraege[storageKey] || [];
              const setListe = fn => setEintraege(prev=>({...prev,[storageKey]:fn(prev[storageKey]||[])}));
              return (
              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:12}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:12,textTransform:"uppercase"}}>{t("einmalig_abzuege_titel")}</div>
                <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>{t("einmalig_hint")} {T.months[month]} {year}</div>
                {liste.map((item,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                    <input type="text" value={item.name||""} placeholder={t("bezeichnung")}
                      onChange={e=>setListe(l=>{const n=[...l];n[i]={...n[i],name:e.target.value};return n;})}
                      style={{...inp,flex:2,fontSize:13,padding:"9px 12px"}} />
                    <input type="number" min="0" step="0.01" value={item.betrag||""} placeholder="€"
                      onChange={e=>setListe(l=>{const n=[...l];n[i]={...n[i],betrag:e.target.value};return n;})}
                      style={{...inp,flex:1,fontSize:13,padding:"9px 12px"}} />
                    <button onClick={()=>setListe(l=>{const n=[...l];n.splice(i,1);return n;})}
                      style={{background:"rgba(248,113,113,0.15)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:8,color:"#f87171",cursor:"pointer",padding:"9px 11px",fontSize:15,flexShrink:0}}>✕</button>
                  </div>
                ))}
                {liste.map((item,i)=>(
                  <div key={`typ-${i}`} style={{display:"flex",gap:6,marginBottom:10}}>
                    {[["brutto",t("zahlung_plus"),"#f59e0b"],["netto",t("netto_plus"),"#34d399"],["abzug",t("abzug_minus"),"#f87171"]].map(([typ,label,col])=>(
                      <button key={typ} onClick={()=>setListe(l=>{const n=[...l];n[i]={...n[i],typ};return n;})}
                        style={{flex:1,padding:"5px 0",borderRadius:8,border:"1px solid",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",
                          borderColor:(item.typ||"brutto")===typ?col:"rgba(255,255,255,0.1)",
                          background:(item.typ||"brutto")===typ?`${col}22`:"rgba(255,255,255,0.03)",
                          color:(item.typ||"brutto")===typ?col:"#6b7280"}}>
                        {label}
                      </button>
                    ))}
                  </div>
                ))}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setListe(l=>[...l,{name:"",betrag:"",typ:"brutto"}])}
                    style={{flex:1,padding:"10px",borderRadius:10,border:"1px dashed rgba(245,158,11,0.4)",background:"rgba(245,158,11,0.05)",color:"#f59e0b",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                    {t("zahlung_btn")}
                  </button>
                  <button onClick={()=>setListe(l=>[...l,{name:"",betrag:"",typ:"abzug"}])}
                    style={{flex:1,padding:"10px",borderRadius:10,border:"1px dashed rgba(248,113,113,0.4)",background:"rgba(248,113,113,0.05)",color:"#f87171",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                    {t("abzug_btn")}
                  </button>
                </div>
              </div>
              );
            })()}

            <div style={{background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.3)",borderRadius:16,padding:20,marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
                <span style={{fontSize:11,letterSpacing:3,color:"#a78bfa",textTransform:"uppercase"}}>{t("bruttogehalt")}</span>
                <span style={{fontSize:22,fontWeight:700,color:"#fff"}}>€ {monatsLohn.toFixed(2)}</span>
              </div>
              {Number(config.bav)>0 && <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#6b7280",marginBottom:4}}>
                <span>{t("bav_label")}</span>
                <span>- € {Number(config.bav).toFixed(2)}</span>
              </div>}
              {(Number(config.bav)>0||bruttoAbzuegeTotal>0) && <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#9ca3af",marginBottom:4}}>
                <span>{t("steuerbrutto")}</span>
                <span style={{fontWeight:600}}>€ {nettoMonat.steuerBrutto.toFixed(2)}</span>
              </div>}
              <div style={{fontSize:11,color:"#6b7280"}}>
                SK {config.steuerklasse} · {BUNDESLAENDER.find(b=>b[0]===config.bundesland)?.[1]||config.bundesland}
                {config.kirchensteuer?" · Kirchensteuer":""}
                {Number(config.kinderfreibetrage)>0?` · ${config.kinderfreibetrage} Kinderfreibetrag`:""}
                {Number(config.erwartetesJahresbrutto)>0 && <div style={{marginTop:4,fontSize:11,color:"#34d399"}}>📊 Jahresbrutto-Basis: € {Number(config.erwartetesJahresbrutto).toLocaleString('de-DE')}</div>}
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:12}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:12,textTransform:"uppercase"}}>{t("sozialversicherung")}</div>
              {[[t("rentenversicherung"),nettoMonat.rv],[t("arbeitslosenversicherung"),nettoMonat.av],[t("krankenversicherung"),nettoMonat.kv],[t("pflegeversicherung"),nettoMonat.pv]].map(([label,val])=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#9ca3af"}}>{label}</span>
                  <span style={{color:"#f87171"}}>- € {val.toFixed(2)}</span>
                </div>
              ))}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                <span style={{color:"#9ca3af"}}>{t("kv_zusatz_label")} ({((Number(config.kvZusatz)||2.98)/2).toFixed(2)}%)</span>
                <span style={{color:"#f87171"}}>- € {nettoMonat.zvBei.toFixed(2)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.08)",fontWeight:700}}>
                <span style={{color:"#9ca3af"}}>{t("sv_gesamt")}</span>
                <span style={{color:"#f87171"}}>- € {nettoMonat.svGesamtMitZV.toFixed(2)}</span>
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:16}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:12,textTransform:"uppercase"}}>{t("steuern")}</div>
              {[[t("lohnsteuer"),nettoMonat.lohnsteuer],[t("solidaritaetszuschlag"),nettoMonat.soli],...(config.kirchensteuer?[[t("kirchensteuer"),nettoMonat.kirchensteuer]]:[])].map(([label,val])=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                  <span style={{color:"#9ca3af"}}>{label}</span>
                  <span style={{color:"#f87171"}}>- € {val.toFixed(2)}</span>
                </div>
              ))}
            </div>

            {nettoMonat.zusatzAbzuege && nettoMonat.zusatzAbzuege.length > 0 && (
              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:12,textTransform:"uppercase"}}>{t("zusatzabzuege")}</div>
                {nettoMonat.zusatzAbzuege.map((a,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13}}>
                    <span style={{color:"#9ca3af"}}>{a.name||"Abzug"}</span>
                    <span style={{color:"#f87171"}}>- € {Number(a.betrag||0).toFixed(2)}</span>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.08)",fontWeight:700}}>
                  <span style={{color:"#9ca3af"}}>{t("sv_gesamt")}</span>
                  <span style={{color:"#f87171"}}>- € {nettoMonat.zusatzGesamt.toFixed(2)}</span>
                </div>
              </div>
            )}
            {/* Zusätzliche steuerfreie Bezüge */}
            {(monatsSpesen > 0 || monatsKleider > 0) && (
              <div style={{background:"rgba(52,211,153,0.08)",border:"1px solid rgba(52,211,153,0.25)",borderRadius:16,padding:20,marginBottom:12}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#34d399",marginBottom:12,textTransform:"uppercase"}}>✅ {t("gesamt_steuerfrei")}</div>
                {monatsSpesen > 0 && (
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:13}}>
                    <span style={{color:"#9ca3af"}}>🍽️ Spesen ({Math.round(monatsSpesen/Number(config.spesenBetrag))} Tage × € {Number(config.spesenBetrag).toFixed(2)})</span>
                    <span style={{color:"#34d399",fontWeight:600}}>+ € {monatsSpesen.toFixed(2)}</span>
                  </div>
                )}
                {monatsKleider > 0 && (
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,fontSize:13}}>
                    <span style={{color:"#9ca3af"}}>👕 Kleiderreinigung (× € {Number(config.kleiderreinigungBetrag||0).toFixed(2)}/Tag)</span>
                    <span style={{color:"#60a5fa",fontWeight:600}}>+ € {monatsKleider.toFixed(2)}</span>
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:"1px solid rgba(52,211,153,0.2)",fontWeight:700,fontSize:13}}>
                  <span style={{color:"#34d399"}}>{t("gesamt_steuerfrei")}</span>
                  <span style={{color:"#34d399"}}>+ € {(monatsSpesen + monatsKleider).toFixed(2)}</span>
                </div>
              </div>
            )}

            {(einmaligNetto>0||einmaligAbzug>0) && (
              <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:16,marginBottom:12}}>
                <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa",marginBottom:10,textTransform:"uppercase"}}>{t("einmalig_netto_label")}</div>
                {einmaligNetto>0 && (
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                    <span style={{color:"#34d399"}}>{t("einmalig_netto")}</span>
                    <span style={{color:"#34d399",fontWeight:600}}>+ € {einmaligNetto.toFixed(2)}</span>
                  </div>
                )}
                {einmaligAbzug>0 && (
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                    <span style={{color:"#f87171"}}>{t("einmalig_abzuege")}</span>
                    <span style={{color:"#f87171",fontWeight:600}}>- € {einmaligAbzug.toFixed(2)}</span>
                  </div>
                )}
              </div>
            )}
            <div style={{background:"linear-gradient(135deg,rgba(52,211,153,0.15),rgba(167,139,250,0.15))",border:"1px solid rgba(52,211,153,0.4)",borderRadius:16,padding:24,textAlign:"center"}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#34d399",marginBottom:8,textTransform:"uppercase"}}>{t("nettolohn")}</div>
