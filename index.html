                  const isSelected=(config.appHintergrund||"linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)")=== bg;
                  return (
                    <button key={labelKey} onClick={()=>setConfig(prev=>({...prev,appHintergrund:bg}))}
                      style={{padding:"0",borderRadius:14,border:isSelected?`2px solid ${config.appAccentColor||"#a78bfa"}`:"2px solid transparent",cursor:"pointer",overflow:"hidden",height:64,position:"relative",transition:"border 0.15s"}}>
                      <div style={{width:"100%",height:"100%",background:bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
                        <span style={{fontSize:11,color:"rgba(255,255,255,0.85)",fontWeight:600,textShadow:"0 1px 4px rgba(0,0,0,0.8)",letterSpacing:0.3}}>{t(labelKey)}</span>
                      </div>
                      {isSelected && <div style={{position:"absolute",top:4,right:6,fontSize:14}}>✓</div>}
                    </button>
                  );
                })}
              </div>

              {/* Startansicht */}
              <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20}}>
                {t("startansicht")}
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>{t("startansicht_hint")}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
                {[
                  {id:"erfassen",icon:"⏱",labelKey:"nav_erfassen"},
                  {id:"woche",icon:"🗓️",labelKey:"nav_woche"},
                  {id:"monat",icon:"📅",labelKey:"nav_monat"},
                  {id:"jahr",icon:"📆",labelKey:"nav_jahr"},
                  {id:"netto",icon:"💶",labelKey:"nav_netto"},
                  {id:"einstellungen",icon:"⚙️",labelKey:"nav_einstellungen"},
                ].map(tab=>(
                  <button key={tab.id} onClick={()=>setConfig(prev=>({...prev,appStartView:tab.id}))}
                    style={{padding:"10px 12px",borderRadius:12,border:"1px solid",cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:13,textAlign:"left",display:"flex",alignItems:"center",gap:8,
                      borderColor:(config.appStartView||"erfassen")===tab.id?(config.appAccentColor||"#a78bfa"):"rgba(255,255,255,0.1)",
                      background:(config.appStartView||"erfassen")===tab.id?`${config.appAccentColor||"#a78bfa"}22`:"rgba(255,255,255,0.04)",
                      color:(config.appStartView||"erfassen")===tab.id?(config.appAccentColor||"#a78bfa"):"#9ca3af"}}>
                    <span style={{fontSize:18}}>{tab.icon}</span>{t(tab.labelKey)}
                  </button>
                ))}
              </div>


              {/* Erfassen Felder */}
              <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20}}>
                {t("erfassen_felder")}
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:14}}>{t("erfassen_felder_hint")}</div>
              {[
                {key:"tour",           labelKey:"feld_tour",           icon:"🗺️"},
                {key:"kilometer",      labelKey:"feld_kilometer",      icon:"📍"},
                {key:"kraftstoff",     labelKey:"feld_kraftstoff",     icon:"⛽"},
                {key:"kunden",         labelKey:"feld_kunden",         icon:"👥"},
                {key:"abholer",        labelKey:"feld_abholer",        icon:"📦"},
                {key:"startkilometer", labelKey:"feld_startkilometer", icon:"🔢"},
                {key:"endkilometer",   labelKey:"feld_endkilometer",   icon:"🏁"},
                {key:"fahrzeug",       labelKey:"feld_fahrzeug",       icon:"🚗"},
                {key:"trinkgeld",      labelKey:"feld_trinkgeld",      icon:"💰"},
                {key:"nachname",       labelKey:"feld_nachname",       icon:"💵"},
                {key:"projekt",        labelKey:"feld_projekt",        icon:"📁"},
                {key:"patienten",      labelKey:"feld_patienten",      icon:"🏥"},
                {key:"einsatzort",     labelKey:"feld_einsatzort",     icon:"📌"},
                {key:"notiz",          labelKey:"feld_notiz",          icon:"📝"},
              ].map(({key,labelKey,icon})=>{
                const felder = config.erfassenFelder || {};
                const aktiv = felder[key] !== false;
                return (
                  <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:"rgba(255,255,255,0.04)",borderRadius:12,marginBottom:8,border:`1px solid ${aktiv?(config.appAccentColor||"#a78bfa")+"44":"rgba(255,255,255,0.06)"}`}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:18}}>{icon}</span>
                      <span style={{fontSize:14,fontWeight:600,color:aktiv?"#e8e0f0":"#6b7280"}}>{t(labelKey)}</span>
                    </div>
                    <div onClick={()=>setConfig(prev=>({...prev,erfassenFelder:{...(prev.erfassenFelder||{}), [key]:!aktiv}}))}
                      style={{width:40,height:22,borderRadius:11,cursor:"pointer",background:aktiv?(config.appAccentColor||"#a78bfa"):"rgba(255,255,255,0.1)",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                      <div style={{position:"absolute",top:2,left:aktiv?20:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                    </div>
                  </div>
                );
              })}

              {/* App zurücksetzen */}
              <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20,marginTop:20}}>
                {t("eigene_felder")}
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:14}}>{t("eigene_felder_hint")}</div>

              {(config.eigeneFelder||[]).map((feld,i)=>(
                <div key={feld.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:14,marginBottom:10,border:`1px solid ${feld.aktiv!==false?(config.appAccentColor||"#a78bfa")+"44":"rgba(255,255,255,0.06)"}`,overflow:"hidden"}}>
                  {/* Header mit Toggle und Löschen */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",gap:8}}>
                    <input type="text" value={feld.icon||""} placeholder="📋"
                      onChange={e=>{const f=[...(config.eigeneFelder||[])];f[i]={...f[i],icon:e.target.value};setConfig(prev=>({...prev,eigeneFelder:f}));}}
                      style={{...inp,width:48,padding:"6px",textAlign:"center",fontSize:18,flexShrink:0}} />
                    <input type="text" value={feld.label} placeholder={t("feld_bezeichnung")}
                      onChange={e=>{const f=[...(config.eigeneFelder||[])];f[i]={...f[i],label:e.target.value};setConfig(prev=>({...prev,eigeneFelder:f}));}}
                      style={{...inp,flex:1,fontSize:14,padding:"8px 12px"}} />
                    <div onClick={()=>{const f=[...(config.eigeneFelder||[])];f[i]={...f[i],aktiv:f[i].aktiv===false?true:false};setConfig(prev=>({...prev,eigeneFelder:f}));}}
                      style={{width:40,height:22,borderRadius:11,cursor:"pointer",background:feld.aktiv===false?"rgba(255,255,255,0.1)":(config.appAccentColor||"#a78bfa"),position:"relative",transition:"background 0.2s",flexShrink:0}}>
                      <div style={{position:"absolute",top:2,left:feld.aktiv===false?2:20,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                    </div>
                    <button onClick={()=>{const f=[...(config.eigeneFelder||[])];f[i]={...f[i],_loeschenBestaetigen:true};setConfig(prev=>({...prev,eigeneFelder:f}));}}
                      style={{background:"rgba(248,113,113,0.15)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:8,color:"#f87171",cursor:"pointer",padding:"6px 10px",fontSize:14,flexShrink:0}}>🗑️</button>
                  </div>
                  {/* Löschen Bestätigung */}
                  {feld._loeschenBestaetigen && (
                    <div style={{padding:"10px 14px",background:"rgba(248,113,113,0.1)",borderTop:"1px solid rgba(248,113,113,0.2)",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,color:"#f87171",flex:1}}>{t("feld_loeschen_confirm")}</span>
                      <button onClick={()=>{const f=[...(config.eigeneFelder||[])];f.splice(i,1);setConfig(prev=>({...prev,eigeneFelder:f}));}}
                        style={{background:"rgba(248,113,113,0.3)",border:"1px solid rgba(248,113,113,0.5)",borderRadius:8,color:"#f87171",cursor:"pointer",padding:"6px 14px",fontSize:13,fontFamily:"inherit",fontWeight:700}}>
                        {t("feld_typ_text")==="Text"?"Ja löschen":"Yes, delete"}
                      </button>
                      <button onClick={()=>{const f=[...(config.eigeneFelder||[])];f[i]={...f[i],_loeschenBestaetigen:false};setConfig(prev=>({...prev,eigeneFelder:f}));}}
                        style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,color:"#9ca3af",cursor:"pointer",padding:"6px 14px",fontSize:13,fontFamily:"inherit"}}>
                        Abbrechen
                      </button>
                    </div>
                  )}
                  {/* Feldtyp */}
                  {!feld._loeschenBestaetigen && (
                  <div style={{padding:"0 14px 12px",display:"flex",gap:8}}>
                    {["text","zahl","janein"].map(typ=>(
                      <button key={typ} onClick={()=>{const f=[...(config.eigeneFelder||[])];f[i]={...f[i],typ};setConfig(prev=>({...prev,eigeneFelder:f}));}}
                        style={{flex:1,padding:"7px 4px",borderRadius:10,border:"1px solid",cursor:"pointer",fontSize:12,fontFamily:"inherit",fontWeight:600,
                          borderColor:(feld.typ||"text")===typ?(config.appAccentColor||"#a78bfa"):"rgba(255,255,255,0.1)",
                          background:(feld.typ||"text")===typ?`${(config.appAccentColor||"#a78bfa")}22`:"rgba(255,255,255,0.03)",
                          color:(feld.typ||"text")===typ?(config.appAccentColor||"#a78bfa"):"#6b7280"}}>
                        {typ==="text"?"🔤 "+t("feld_typ_text"):typ==="zahl"?"🔢 "+t("feld_typ_zahl"):"✅ "+t("feld_typ_janein")}
                      </button>
                    ))}
                  </div>
                  )}
                </div>
              ))}

              <button onClick={()=>{
                const neuesId = `custom_${Date.now()}`;
                setConfig(prev=>({...prev,eigeneFelder:[...(prev.eigeneFelder||[]),{id:neuesId,label:"",typ:"text",icon:"📋",aktiv:true}]}));
              }}
                style={{width:"100%",padding:"12px",borderRadius:12,border:`1px dashed ${(config.appAccentColor||"#a78bfa")}66`,background:`${(config.appAccentColor||"#a78bfa")}08`,color:config.appAccentColor||"#a78bfa",cursor:"pointer",fontSize:14,fontFamily:"inherit",marginBottom:20}}>
                {t("eigenes_feld_add")}
              </button>

              {/* Dezimalformat */}
              <div style={{marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",border:"1px solid rgba(255,255,255,0.08)"}}>
                <div>
                  <div style={{fontWeight:600,fontSize:14}}>{t("dezimal_label")}</div>
                  <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>
                    {config.dezimalformat ? t("dezimal_ein") : t("dezimal_aus")}
                  </div>
                </div>
                <div onClick={()=>setConfig(prev=>({...prev,dezimalformat:!prev.dezimalformat}))}
                  style={{width:48,height:26,borderRadius:13,cursor:"pointer",background:config.dezimalformat?(config.appAccentColor||"#a78bfa"):"rgba(255,255,255,0.15)",position:"relative",transition:"background 0.2s",flexShrink:0}}>
                  <div style={{position:"absolute",top:3,left:config.dezimalformat?25:3,width:20,height:20,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                </div>
              </div>

              {/* Tagestypen */}
              <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20}}>
                {t("tagestypen")}
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>{t("tagestypen_hint")}</div>
              {(config.tagestypen||DEFAULT_TAGESTYPEN).map((typ,i)=>(
              <div key={typ.id} style={{background:"rgba(255,255,255,0.04)",borderRadius:14,marginBottom:10,border:`1px solid ${typ.aktiv===false?"rgba(255,255,255,0.06)":typ.color+"44"}`,overflow:"hidden"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20}}>{typ.icon}</span>
                    <div>
                      <div style={{fontWeight:600,fontSize:14,color:typ.aktiv===false?"#6b7280":typ.color}}>{tTypLabel(typ)}</div>
                      <div style={{fontSize:11,color:"#6b7280"}}>
                        {typ.zaehlt?`⏱ ${t("arbeitszeit")}`:typ.bezahlt?`💶 ${t("wird_bezahlt")} (${typ.bezahltStunden||config.regelarbeitszeit}h)`:`– ${t("nicht_erfasst")}`}
                      </div>
                    </div>
                  </div>
                  <div onClick={()=>setConfig(prev=>{const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];tt[i]={...tt[i],aktiv:tt[i].aktiv===false?true:false};return {...prev,tagestypen:tt};})}
                    style={{width:40,height:22,borderRadius:11,cursor:"pointer",background:typ.aktiv===false?"rgba(255,255,255,0.1)":typ.color,position:"relative",transition:"background 0.2s",flexShrink:0}}>
                    <div style={{position:"absolute",top:2,left:typ.aktiv===false?2:20,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                  </div>
                </div>
                {!typ.zaehlt && (
                  <div style={{borderTop:`1px solid ${typ.color}22`,padding:"12px 16px",background:"rgba(0,0,0,0.15)"}}>
                    <div style={{fontSize:11,color:"#a78bfa",letterSpacing:1,marginBottom:10,textTransform:"uppercase"}}>{t("vergütung")}</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:typ.bezahlt?12:0}}>
                      <span style={{fontSize:13,color:"#9ca3af"}}>{t("wird_bezahlt")}</span>
                      <div onClick={()=>setConfig(prev=>{const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];tt[i]={...tt[i],bezahlt:!tt[i].bezahlt};return {...prev,tagestypen:tt};})}
                        style={{width:40,height:22,borderRadius:11,cursor:"pointer",background:typ.bezahlt?typ.color:"rgba(255,255,255,0.1)",position:"relative",transition:"background 0.2s"}}>
                        <div style={{position:"absolute",top:2,left:typ.bezahlt?20:2,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left 0.2s"}} />
                      </div>
                    </div>
                    {typ.bezahlt && (
                      <div style={{marginTop:8}}>
                        <div style={{fontSize:11,color:"#a78bfa",letterSpacing:1,marginBottom:8,textTransform:"uppercase"}}>{t("bezahlt_stunden")}</div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                          {[config.regelarbeitszeit,4,6,8].map(h=>(
                            <button key={h} onClick={()=>setConfig(prev=>{const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];tt[i]={...tt[i],bezahltStunden:h};return {...prev,tagestypen:tt};})}
                              style={{padding:"6px 12px",borderRadius:8,border:"1px solid",cursor:"pointer",fontSize:13,fontFamily:"inherit",
                                borderColor:(typ.bezahltStunden||config.regelarbeitszeit)===h?typ.color:"rgba(255,255,255,0.1)",
                                background:(typ.bezahltStunden||config.regelarbeitszeit)===h?`${typ.color}22`:"rgba(255,255,255,0.03)",
                                color:(typ.bezahltStunden||config.regelarbeitszeit)===h?typ.color:"#6b7280"}}>
                              {h}h
                            </button>
                          ))}
                          <input type="number" min="0" max="24" step="0.5"
                            value={![config.regelarbeitszeit,4,6,8].includes(typ.bezahltStunden||config.regelarbeitszeit)?(typ.bezahltStunden||""):""}
                            onChange={e=>setConfig(prev=>{const tt=[...(prev.tagestypen||DEFAULT_TAGESTYPEN)];tt[i]={...tt[i],bezahltStunden:Number(e.target.value)};return {...prev,tagestypen:tt};})}
                            style={{...inp,width:80,padding:"6px 10px",fontSize:13,textAlign:"center"}} />
                        </div>
                        <div style={{marginTop:10,fontSize:12,color:"#6b7280"}}>
                          = <strong style={{color:typ.color}}>€ {((typ.bezahltStunden||config.regelarbeitszeit)*config.stundenlohn).toFixed(2)}</strong> {t("pro_tag")}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
              ))}
              <button onClick={()=>{ if(window.confirm(t("tagestypen_reset_confirm"))) setConfig(prev=>({...prev,tagestypen:DEFAULT_TAGESTYPEN})); }}
                style={{width:"100%",padding:"12px",borderRadius:12,border:"1px dashed rgba(248,113,113,0.4)",background:"rgba(248,113,113,0.05)",color:"#f87171",cursor:"pointer",fontSize:14,fontFamily:"inherit",marginBottom:16,marginTop:8}}>
                {t("tagestypen_reset")}
              </button>

              {/* Datensicherung */}
              <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20,marginTop:4}}>
                📦 {t("datensicherung")}
              </div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12,lineHeight:1.6}}>
                {t("datensicherung_hint")}
              </div>
              <button onClick={()=>{
                const data = { eintraege, config, exportDatum: new Date().toISOString() };
                const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                const datum = new Date().toISOString().slice(0,10);
                a.href=url; a.download=`WorkTracker_Backup_${datum}.json`; a.click();
                URL.revokeObjectURL(url);
              }} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(52,211,153,0.4)",background:"rgba(52,211,153,0.08)",color:"#34d399",cursor:"pointer",fontSize:14,fontFamily:"inherit",marginBottom:10,fontWeight:600}}>
                {t("export_btn")}
              </button>
              <label style={{display:"block",width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(96,165,250,0.4)",background:"rgba(96,165,250,0.08)",color:"#60a5fa",cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:600,textAlign:"center",boxSizing:"border-box",marginBottom:20}}>
                {t("import_btn")}
                <input type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                  const file=e.target.files[0]; if(!file) return;
                  const reader=new FileReader();
                  reader.onload=ev=>{
                    try {
                      const data=JSON.parse(ev.target.result);
                      if(!data.eintraege) { alert(t("err_backup")); return; }
                      if(window.confirm(`${t("backup_bestaetigen")} ${data.exportDatum?new Date(data.exportDatum).toLocaleDateString("de-DE"):"?"} ${t("backup_bestaetigen2")}`)) {
                        setEintraege(data.eintraege);
                        if(data.config) setConfig(data.config);
                        alert(t("backup_ok"));
                      }
                    } catch { alert(t("err_datei")); }
                  };
                  reader.readAsText(file);
                  e.target.value="";
                }} />
              </label>

              {/* App zurücksetzen */}
              <div style={{fontSize:13,letterSpacing:2,color:"#a78bfa",textTransform:"uppercase",marginBottom:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:20,marginTop:4}}>
                {t("app_reset")}
              </div>
              <button onClick={()=>{ if(window.confirm(t("app_reset_confirm"))) setConfig(prev=>({...prev,appName:"WorkTracker",appAccentColor:"#a78bfa",appStartView:"erfassen",appWaehrung:"€",appKompaktansicht:false,appHintergrund:"linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)"})); }}
                style={{width:"100%",padding:"13px",borderRadius:12,border:"1px dashed rgba(248,113,113,0.4)",background:"rgba(248,113,113,0.05)",color:"#f87171",cursor:"pointer",fontSize:14,fontFamily:"inherit",marginBottom:8}}>
                {t("app_reset_btn")}
              </button>
              <button onClick={()=>{ if(window.confirm(t("alle_daten_confirm"))) { localStorage.removeItem("arbeitszeit_eintraege"); localStorage.removeItem("arbeitszeit_config"); window.location.reload(); } }}
                style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid rgba(248,113,113,0.5)",background:"rgba(248,113,113,0.1)",color:"#f87171",cursor:"pointer",fontSize:14,fontFamily:"inherit",fontWeight:700,marginBottom:24}}>
                {t("alle_daten_loeschen")}
              </button>

              {/* App-Info */}
              <div style={{padding:16,background:"rgba(255,255,255,0.03)",borderRadius:12,border:"1px solid rgba(255,255,255,0.07)",fontSize:12,color:"#4b5563",textAlign:"center",lineHeight:1.8}}>
                <div style={{fontSize:18,marginBottom:6}}>⚙️</div>
                <div style={{color:"#6b7280",fontWeight:600}}>{config.appName||"WorkTracker"}</div>
                <div>{t("app_info_label")}</div>
                <div style={{marginTop:6,fontSize:11}}>{t("app_info_local")}</div>
              </div>

            </div>)}

          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(15,12,41,0.97)",backdropFilter:"blur(12px)",borderTop:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-around",padding:"10px 0 20px"}}>
        {[{id:"erfassen",icon:"⏱",labelKey:"nav_erfassen"},{id:"woche",icon:"🗓️",labelKey:"nav_woche"},{id:"monat",icon:"📅",labelKey:"nav_monat"},{id:"jahr",icon:"📆",labelKey:"nav_jahr"},{id:"netto",icon:"💶",labelKey:"nav_netto"},{id:"einstellungen",icon:"⚙️",labelKey:"nav_einstellungen"}].map(tab=>(
          <button key={tab.id} onClick={()=>setView(tab.id)}
            style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:view===tab.id?(config.appAccentColor||"#a78bfa"):"#6b7280",fontSize:10,letterSpacing:0.5,transition:"color 0.2s",padding:"4px 8px"}}>
            <span style={{fontSize:20}}>{tab.icon}</span>
            {t(tab.labelKey)}
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
